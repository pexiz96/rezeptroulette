  <style>
    
    
    
    * { box-sizing: border-box; }

    body {
      margin: 0;

    header {

    .hero {

    .card {

flex-wrap: wrap;
gap: 10px;

flex-direction: column;
gap: 18px;

    .step {

    .filters {

      gap: 12px;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    .filters input,

      padding: 14px 16px;
      border: none;

      font-size: 16px;

<body>
    <div id="toast" class="toast"></div>
    <nav class="bottom-nav">

  <header>

</div>

</div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-badge">🍽️ Smarte Rezeptplanung</div>
      <h1>Was essen wir heute?</h1>
      <p class="muted">
        Ziehe ein zufälliges Rezept, stöbere durch alle Gerichte und sieh dir Zutaten und Anleitung direkt in der App an.
      </p>

      <div class="hero-stats">
  <div class="hero-stat">
    <strong id="recipeCount">0</strong>
    <span>Rezepte</span>
  </div>

  <div class="hero-stat">
    <strong>∞</strong>
    <span>Kombinationen</span>
  </div>

  <div class="hero-stat">
    <strong>7</strong>
    <span>Tage Planung</span>
  </div>
</div>

      <div class="buttons">
        <button class="primary" onclick="loadRoulette()">🎲 Rezept ziehen</button>
        <button class="secondary" onclick="loadRecipes()">🍲 Alle Rezepte</button>
        <button class="secondary" onclick="loadWeeklyPlan()">📅 Wochenplan</button>
        <button class="secondary" onclick="loadShoppingList()">🛒 Einkaufsliste</button>
        <button class="secondary" onclick="loadFoodRescue()">♻️ Food Rescue</button>
      </div>
    </section>

    <section id="content"></section>

  <script>
    let ratings = JSON.parse(localStorage.getItem("ratings") || "{}");
    let recentRecipes = JSON.parse(localStorage.getItem("recentRecipes") || "[]");
    let allRecipes = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

    function imageUrl(recipe) {
      const raw = recipe.image || recipe.bild || recipe.image_url;
      if (!raw) return "";
      return raw.startsWith("http") ? raw : `/static/images/${raw}`;
    }

    function showHome() {
        setActiveNav("home");
      document.getElementById("content").innerHTML = "";
      document.getElementById("home").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function hideHome() {
      document.getElementById("home").classList.add("hidden");
    }

    async function loadRecipes() {
        setActiveNav("recipes");
      hideHome();

      const content = document.getElementById("content");
      content.innerHTML = "<p>Rezepte werden geladen...</p>";

      const response = await fetch("/rezepte");
      allRecipes = await response.json();

      content.innerHTML = `
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>Alle Rezepte</h2>

        <div class="filters">
          <input id="searchInput" placeholder="Rezept suchen..." oninput="renderRecipes()" />
        <label class="favorite-filter">
  <input type="checkbox" id="favoriteOnly" onchange="renderRecipes()" />
  Nur Favoriten
</label>
          <select id="kitchenFilter" onchange="renderRecipes()">
            <option value="">Alle Küchen</option>
          </select>
        </div>

        <div class="grid" id="recipeGrid"></div>
      `;

      fillKitchenFilter();
      renderRecipes();
    }

    function fillKitchenFilter() {
      const select = document.getElementById("kitchenFilter");
      const kitchens = [...new Set(allRecipes.map(r => r.kueche).filter(Boolean))].sort();

      select.innerHTML = `<option value="">Alle Küchen</option>` +
        kitchens.map(k => `<option value="${k}">${k}</option>`).join("");
    }

    function renderRecipes() {
      const search = document.getElementById("searchInput")?.value.toLowerCase() || "";
      const kitchen = document.getElementById("kitchenFilter")?.value || "";
      const favoriteOnly = document.getElementById("favoriteOnly")?.checked;
      const grid = document.getElementById("recipeGrid");

      if (!grid) return;

      const filtered = allRecipes.filter(recipe => {
        const matchesSearch = recipe.name.toLowerCase().includes(search);
        const matchesKitchen = !kitchen || recipe.kueche === kitchen;
        const matchesFavorite = !favoriteOnly || favorites.includes(recipe.id);

return matchesSearch && matchesKitchen && matchesFavorite;
      });

      grid.innerHTML = filtered.length
        ? filtered.map(recipe => recipeCard(recipe)).join("")
        : `<p>Keine Rezepte gefunden.</p>`;
    }

    function recipeCard(recipe) {
      const img = imageUrl(recipe);

      return `
        <div class="card">
          ${
            img
              ? `<img src="${img}" alt="${recipe.name}">`
              : `<div class="placeholder">Kein Bild</div>`
          }

          <div class="card-body">
          <div class="favorite-row">
  <button class="favorite-btn" onclick="toggleFavorite(${recipe.id})">
    ${isFavorite(recipe.id) ? "❤️" : "🤍"}
  </button>
</div>  
            <h3>${recipe.name}</h3>
            <div class="meta">
              ${recipe.kueche || "Unbekannt"} · ${recipe.kochzeit || "?"} Min · ${recipe.schwierigkeit || "Einfach"}
            </div>
            <div class="card-actions">
  <button class="primary" onclick="showRecipe(${recipe.id})">
    Rezept ansehen
  </button>

  <button class="secondary" onclick="quickAddToPlan(${recipe.id})">
    📅 Planen
  </button>
</div>
          </div>
        </div>
      `;
    }

    async function showRecipe(id) {
      hideHome();

      if (!allRecipes.length) {
        const response = await fetch("/rezepte");
        allRecipes = await response.json();
      }

      const recipe = allRecipes.find(r => r.id === id);
      saveRecentRecipe(recipe);
      if (!recipe) return;

      const img = imageUrl(recipe);

      document.getElementById("content").innerHTML = `
        <button class="secondary" onclick="loadRecipes()">← Zurück zu allen Rezepten</button>

        <div class="detail">
          ${
            img
              ? `<img src="${img}" alt="${recipe.name}">`
              : `<div class="placeholder">Kein Bild</div>`
          }

          <div class="detail-body">
            <h1>${recipe.name}</h1>
            <div class="meta">
                ${ratingStars(recipe.id)}
             <span>🌍 ${recipe.kueche || "Unbekannt"}</span>
<span>🍽️ ${recipe.portionen || "?"} Portionen</span>
<span>⏱️ ${recipe.kochzeit || "?"} Min</span>
<span>🔥 ${recipe.schwierigkeit || "Einfach"}</span>
            </div>

            <div class="columns">
              <div>
                <h2>Zutaten</h2>
                <div class="ingredients">
                  ${(recipe.zutaten || []).map(item => `<div class="ingredient">✓ ${item}</div>`).join("")}
                </div>
              </div>

              <div>
                <h2>Anleitung</h2>
                <div class="steps">
                  ${(recipe.anleitung || "Keine Anleitung vorhanden.")
                    .split("\n")
                    .filter(step => step.trim())
                    .map(step => `<div class="step">${step}</div>`)
                    .join("")}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

 async function loadRoulette() {
  hideHome();

  const content = document.getElementById("content");
  content.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>
    <h2>🎲 Rezept-Roulette</h2>
    <div class="roulette-loader" id="rouletteLoader">
      <div class="dice">🎲</div>
      <p>Roulette dreht...</p>
    </div>
  `;

  if (!allRecipes.length) {
    const response = await fetch("/rezepte");
    allRecipes = await response.json();
  }

  const loader = document.getElementById("rouletteLoader");

  let counter = 0;
  const interval = setInterval(() => {
    const randomRecipe = allRecipes[Math.floor(Math.random() * allRecipes.length)];
    loader.innerHTML = `
      <div class="dice">🎲</div>
      <p>${randomRecipe.name}</p>
    `;
    counter++;
  }, 120);

  setTimeout(async () => {
    clearInterval(interval);

    const response = await fetch("/roulette");
    const recipe = await response.json();

    allRecipes = [recipe];

    content.innerHTML = `
      <button class="secondary" onclick="showHome()">← Zurück</button>
      <h2>🎉 Dein Zufallsrezept</h2>
      <div class="grid" id="recipeGrid">
        ${recipeCard(recipe)}
      </div>
    `;

    showToast("Rezept gezogen!");
  }, 1800);
}

   async function loadWeeklyPlan() {
    setActiveNav("plan");
  hideHome();

  const content = document.getElementById("content");

  if (!allRecipes.length) {
    const recipeResponse = await fetch("/rezepte");
    allRecipes = await recipeResponse.json();
  }

  const response = await fetch("/wochenplan");
  const plan = await response.json();

  const days = [
    "Montag",
    "Dienstag",
    "Mittwoch",
    "Donnerstag",
    "Freitag",
    "Samstag",
    "Sonntag"
  ];

  content.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>

    <h2>📅 Wochenplan</h2>
    <div class="buttons">
  <button class="primary" onclick="autoFillWeek()">
    ✨ Woche automatisch planen
  </button>

  <button class="secondary" onclick="resetWeek()">
    🗑️ Woche leeren
  </button>
</div>

    <div class="grid">
      ${days.map(day => {
        const planValue =
  plan[day] ||
  plan[day.toLowerCase()] ||
  plan[day.toUpperCase()];

const recipeId =
  typeof planValue === "object" && planValue !== null
    ? planValue.id
    : Number(planValue);

const recipe = allRecipes.find(r => Number(r.id) === Number(recipeId));

        return `
          <div class="card">
            <div class="card-body">
              <h3>📅 ${day}</h3>

              ${
                recipe
                  ? `
                    ${
  imageUrl(recipe)
    ? `<img class="week-image" src="${imageUrl(recipe)}" alt="${recipe.name}">`
    : ""
}

<p class="week-title">${recipe.name}</p>
                    <button class="primary" onclick="showRecipe(${recipe.id})">
                      Rezept ansehen
                    </button>

                    <button class="secondary" onclick="clearDay('${day}')">
  ❌ Entfernen
</button>
                  `
                  : `
                    <p class="week-empty">Noch kein Rezept gewählt</p>
                  `
              }

              <select onchange="setDayRecipe('${day}', this.value)">
                <option value="">Rezept auswählen</option>

                ${allRecipes.map(r => `
                  <option value="${r.id}">
                    ${r.name}
                  </option>
                `).join("")}
              </select>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

async function setDayRecipe(day, recipeId) {
  if (!recipeId) return;

  const numericId = Number(recipeId);

  const response = await fetch(
    `/wochenplan/${encodeURIComponent(day)}/${numericId}`,
    {
      method: "POST"
    }
  );

  if (!response.ok) {
    showToast("Fehler beim Speichern");
    return;
  }

  showToast("Zum Wochenplan hinzugefügt!");
  await loadWeeklyPlan();
}

   async function loadShoppingList() {
    setActiveNav("list");
  hideHome();

  const content = document.getElementById("content");

  if (!allRecipes.length) {
    const recipeResponse = await fetch("/rezepte");
    allRecipes = await recipeResponse.json();
  }

  const response = await fetch("/wochenplan");
  const plan = await response.json();

  const ingredients = [];

Object.values(plan).forEach(entry => {
  if (!entry) return;

  const recipeId =
    typeof entry === "object"
      ? Number(entry.id)
      : Number(entry);

  const recipe = allRecipes.find(r => Number(r.id) === recipeId);

  if (recipe?.zutaten) {
    ingredients.push(...recipe.zutaten);
  }
});

  const uniqueIngredients = [...new Set(ingredients)];

  content.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>

    <h2>🛒 Einkaufsliste</h2>
<button class="secondary" onclick="copyShoppingList()">Liste kopieren</button>

    ${
      uniqueIngredients.length
        ? `
          <div class="shopping-list">
            ${uniqueIngredients.map(item => `
              <label class="shopping-item">
  <input type="checkbox" />
  <span class="shopping-item-text">${item}</span>
</label>
            `).join("")}
          </div>
        `
        : `
          <p class="muted">
            Füge zuerst Rezepte zum Wochenplan hinzu.
          </p>
        `
    }
  `;
}

function copyShoppingList() {
  const items = [...document.querySelectorAll(".shopping-item-text")]
    .map(item => item.textContent.trim())
    .join("\n");

  navigator.clipboard.writeText(items);
  showToast("Einkaufsliste kopiert!");
}

function setActiveNav(name) {
  document.querySelectorAll(".bottom-nav button").forEach(btn => {
    btn.classList.remove("active");
  });

  const activeButton = document.querySelector(`[data-nav="${name}"]`);
  if (activeButton) activeButton.classList.add("active");
}

function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderRecipes();

function isFavorite(id) {

}

fetch("/rezepte")

function loadFoodRescue() {
  setActiveNav("rescue");
  hideHome();

  const content = document.getElementById("content");

  content.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>

    <h2>♻️ Food Rescue</h2>
    <p class="muted">
      Gib ein, was du zuhause hast. Die App schlägt passende Rezepte aus deiner Datenbank vor.
    </p>

    <div class="rescue-box">
      <textarea id="rescueInput" placeholder="Zum Beispiel:
Sahne
Paprika
Reis
Eier
Käse"></textarea>

      <div class="buttons">
        <button class="primary" onclick="findRescueRecipes()">Lebensmittel retten</button>
      </div>
    </div>

    <div id="rescueResults"></div>
  `;
}

async function findRescueRecipes() {
  const input = document.getElementById("rescueInput").value;

  const available = input
    .split(/\n|,|;/)
    .map(item => item.trim().toLowerCase())
    .filter(Boolean);

  if (!available.length) {
    showToast("Bitte Zutaten eingeben.");
    return;
  }

  if (!allRecipes.length) {
    const response = await fetch("/rezepte");
    allRecipes = await response.json();
  }

  const results = allRecipes.map(recipe => {
    const ingredients = (recipe.zutaten || []).map(z => z.toLowerCase());

    const matches = available.filter(item =>
      ingredients.some(ingredient => ingredient.includes(item))
    );

    const score = matches.length;

    return {
      recipe,
      matches,
      score
    };
  })
  .filter(result => result.score > 0)
  .sort((a, b) => b.score - a.score)
  .slice(0, 8);

  const container = document.getElementById("rescueResults");

  if (!results.length) {
    container.innerHTML = `
      <p class="muted">Keine passenden Rezepte gefunden.</p>
    `;
    return;
  }

  container.innerHTML = `
    <h2>Passende Rezepte</h2>

    <div class="grid">
      ${results.map(result => `
        <div class="card">
          ${
            imageUrl(result.recipe)
              ? `<img src="${imageUrl(result.recipe)}" alt="${result.recipe.name}">`
              : `<div class="placeholder">Kein Bild</div>`
          }

          <div class="card-body">
            <span class="match-badge">${result.score} Treffer</span>
            <h3>${result.recipe.name}</h3>

            <div class="meta">
              Passt zu: ${result.matches.join(", ")}
            </div>

            <div class="card-actions">
              <button class="primary" onclick="showRecipe(${result.recipe.id})">
                Rezept ansehen
              </button>

              <button class="secondary" onclick="quickAddToPlan(${result.recipe.id})">
                📅 Planen
              </button>
            </div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

async function autoFillWeek() {
  if (!allRecipes.length) {
    const response = await fetch("/rezepte");
    allRecipes = await response.json();
  }

  const days = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
  const shuffled = [...allRecipes].sort(() => Math.random() - 0.5).slice(0, 7);

  for (let i = 0; i < days.length; i++) {
    await fetch(`/wochenplan/${days[i]}/${shuffled[i].id}`, {
      method: "POST"
    });
  }

  showToast("Woche automatisch geplant!");
  await loadWeeklyPlan();
}

async function resetWeek() {
  await fetch("/wochenplan/reset", {
    method: "POST"
  });

  showToast("Wochenplan geleert!");
  await loadWeeklyPlan();
}

  setActiveNav("favorites");

  const content = document.getElementById("content");

  if (!allRecipes.length) {

}

function saveRecentRecipe(recipe) {
  recentRecipes = recentRecipes.filter(r => r.id !== recipe.id);
  recentRecipes.unshift({
    id: recipe.id,
    name: recipe.name,
    bild: recipe.bild,
    image: recipe.image,
    kueche: recipe.kueche,
    kochzeit: recipe.kochzeit,
    schwierigkeit: recipe.schwierigkeit
  });

  recentRecipes = recentRecipes.slice(0, 6);
  localStorage.setItem("recentRecipes", JSON.stringify(recentRecipes));
}

function setRating(recipeId, value) {
  ratings[recipeId] = value;
  localStorage.setItem("ratings", JSON.stringify(ratings));
  showToast("Bewertung gespeichert!");
  showRecipe(recipeId);
}

function ratingStars(recipeId) {
  const current = ratings[recipeId] || 0;

  return `
    <div class="rating">
      ${[1,2,3,4,5].map(star => `
        <button onclick="setRating(${recipeId}, ${star})">
          ${star <= current ? "⭐" : "☆"}
        </button>
      `).join("")}
    </div>
  `;
}
