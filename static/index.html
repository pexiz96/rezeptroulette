<head>

  <style>
    *{box-sizing:border-box}

    :root{
      --bg-1:#fff7ed;
      --bg-2:#ffe2cf;
      --text:#2d1b12;
      --muted:#7c4a2d;
      --card:rgba(255,255,255,.86);
      --white:#fff;
      --orange:#ff6b35;
      --amber:#ffb703;
      --green:#067647;
      --green-bg:#ecfdf3;
      --shadow:0 20px 60px rgba(90,40,15,.14);
      --shadow-soft:0 10px 30px rgba(90,40,15,.08);
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
      color:var(--text);
      min-height:100vh;
      letter-spacing:-0.02em;
    }

    header,main{
  max-width:1100px;
  margin:auto;
}

.recipe-slider{
  display:flex;
  gap:18px;
  overflow-x:auto;
  padding:4px 2px 12px;
  scroll-snap-type:x mandatory;
}

.recipe-slider .card{
  min-width:320px;
  max-width:320px;
  flex:0 0 320px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:22px;
}

.card{
  width:100%;
  max-width:none;
  overflow:hidden;
}

.card img{
  width:100%;
  height:190px;
  object-fit:cover;
  object-position:center;
  display:block;
  border-radius:0;
}

.detail img{
  width:100%;
  height:360px;
  object-fit:cover;
  object-position:center;
  display:block;
}

.week-image{
  width:100%;
  height:160px;
  object-fit:cover;
  object-position:center;
  border-radius:18px;
  margin-bottom:14px;
}

    header{
      padding:24px 22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }

    main{padding:20px 22px 170px}

    h1{
      font-size:clamp(40px,6vw,68px);
      margin:12px 0;
      line-height:0.98;
      font-weight:950;
      letter-spacing:-0.05em;
    }

    h2{margin-top:28px}

    button,input,select,textarea{font:inherit}

    button{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 22px;
      font-weight:850;
      transition:.2s ease;
    }

    button:hover{transform:translateY(-2px)}
    button:active{transform:scale(.97)}

    input,select,textarea{
      padding:14px 16px;
      border:none;
      border-radius:16px;
      background:var(--white);
      box-shadow:0 8px 22px rgba(90,40,15,.08);
      color:var(--text);
    }

    textarea{width:100%;min-height:150px;resize:vertical}
    select{width:100%;margin-top:14px;background:#fff7ed}

    .brand{display:flex;align-items:center;gap:14px;font-size:28px;font-weight:900}
    .logo{width:58px;height:58px;object-fit:cover;
object-position:center;border-radius:50%}
    .header-actions{display:flex;gap:10px}

    .primary{
      color:white;
      background:linear-gradient(135deg,var(--orange),var(--amber));
      box-shadow:0 12px 30px rgba(255,107,53,.3);
    }

    .secondary{
      background:var(--white);

    }

    .muted,.meta,.week-empty{color:var(--muted)}

    .buttons,.card-actions,.filters,.hero-stats{

      flex-wrap:wrap;
      gap:12px;
    }

    .buttons{margin-top:22px}

    .hero,.panel,.detail,.card,.roulette-stage{
      background:var(--card);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .hero{
      padding:30px;
      margin-bottom:18px;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:300px;
      height:300px;

      border-radius:50%;

      right:-100px;

    }

    .hero > *{position:relative;z-index:1}

    .hero-badge,.badge,.winner-badge{
      display:inline-flex;
      background:#fff0e6;

      padding:10px 14px;
      border-radius:999px;
      font-weight:850;
    }

    .hero-stat{
      background:var(--white);
      padding:18px 20px;
      border-radius:22px;
      min-width:130px;
      box-shadow:0 10px 24px rgba(90,40,15,.08);
    }

    .hero-stat strong{display:block;font-size:26px}
    .big-cta{font-size:18px;padding:16px 28px}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;

    .card{

      cursor:pointer;

    .card img{
  width:100%;
  height:220px;
  object-fit:cover;
  object-position:center;
  display:block;
  border-radius:22px 22px 0 0;

}

    .card:hover img{transform:scale(1.04)}

    .meta{
      font-size:14px;
      margin-bottom:12px;

    }

    .placeholder{
      height:180px;
      background:linear-gradient(135deg,var(--orange),var(--amber));
      display:grid;
      place-items:center;
      color:white;
      font-weight:900;
    }

    .favorite-row{position:absolute;top:16px;right:16px;z-index:10}

    .favorite-btn{
      width:42px;
      height:42px;
      padding:0;
      border-radius:50%;
      background:#fff7ed;
      display:grid;
      place-items:center;
    }

    .favorite-btn:active{transform:scale(1.25)}

    .filters{margin:18px 0}

    .favorite-filter{
      display:flex;
      align-items:center;
      gap:8px;
      background:var(--white);
      padding:12px 16px;
      border-radius:14px;
      box-shadow:0 8px 22px rgba(90,40,15,.08);
    }

    .detail{overflow:hidden;margin-top:22px;background:var(--white)}
    .detail img{
  width:100%;
  height:420px;
  object-fit:cover;
  object-position:center;

  display:block;
  background:#e9d8c5;
}
    .detail-body{padding:26px;display:flex;flex-direction:column;gap:18px}
    .columns{display:grid;grid-template-columns:.8fr 1.2fr;gap:28px}

    .ingredients,.steps,.shopping-list,.chips{display:flex;flex-wrap:wrap;gap:12px}

    .ingredient,.step,.shopping-item,.chip{
      background:#fff7ed;
      padding:14px 16px;
      border-radius:16px;
      box-shadow:0 6px 18px rgba(90,40,15,.06);
      font-weight:650;
    }

    .ingredients,.steps,.shopping-list{display:grid}

    .shopping-item{display:flex;gap:12px;align-items:center}
    .shopping-item:has(input:checked){opacity:.55;text-decoration:line-through}

   .week-image{
  width:100%;
  height:170px;
  object-fit:cover;
  object-position:center;
  border-radius:18px;
  margin-bottom:14px;
  background:#fff7ed;
    .week-title{font-size:18px;font-weight:850}

    .rating{display:flex;gap:6px;flex-wrap:wrap}
    .rating button{background:#fff7ed;padding:8px 10px;border-radius:12px;font-size:22px;box-shadow:none}

    .toast{
      position:fixed;
      top:20px;
      right:20px;
      background:var(--text);
      color:white;
      padding:14px 18px;
      border-radius:16px;
      opacity:0;
      transform:translateY(-10px);
      transition:.25s;
      z-index:3000;
    }

    .toast.show{opacity:1;transform:translateY(0)}

    .bottom-nav{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      width:calc(100% - 24px);
      max-width:760px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(22px);
      border:1px solid rgba(255,255,255,.45);
      border-radius:26px;
      display:flex;
      justify-content:space-around;
      padding:10px;
      box-shadow:0 12px 40px rgba(90,40,15,.15);
      z-index:1000;
      overflow-x:auto;
    }

    .bottom-nav button{
      background:transparent;
      display:flex;
      flex-direction:column;
      gap:4px;
      align-items:center;
      color:var(--muted);
      font-size:13px;
      padding:8px 10px;
      min-width:72px;
      box-shadow:none;
      transition:.22s ease;
    }

    .bottom-nav button.active{
      background:linear-gradient(135deg,var(--orange),var(--amber));
      color:white;
      transform:translateY(-4px);
      box-shadow:0 12px 30px rgba(255,107,53,.28);
    }

    .home-sections{display:grid;gap:38px;margin-top:30px}

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
      margin-bottom:16px;
    }

    .section-head h2{margin:0;font-size:28px}

    .recipe-slider{
      display:flex;
      gap:18px;
      overflow-x:auto;
      padding:4px 2px 12px;
      scroll-snap-type:x mandatory;
    }

    .recipe-slider::-webkit-scrollbar{display:none}

    .recipe-slider .card{
      min-width:320px;
      scroll-snap-align:start;
      flex-shrink:0;
    }

    .smart-card{
      background:linear-gradient(135deg,var(--orange),var(--amber));
      color:white;
      border-radius:32px;
      padding:30px;
      box-shadow:0 24px 60px rgba(255,107,53,.28);
    }

    .smart-card h2{margin:10px 0;font-size:34px}
    .smart-card p{color:rgba(255,255,255,.92)}

    .smart-tags{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}

    .smart-tags button{
      border:none;
      cursor:pointer;
      transition:.2s ease;
      background:rgba(255,255,255,.22);
      color:white;
      box-shadow:none;
    }

    .smart-tags button:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.3);
    }

    .rescue-card,.empty-state{
      background:var(--white);
      border-radius:32px;
      padding:30px;
      box-shadow:var(--shadow-soft);
    }

    .rescue-chips{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}

    .rescue-chips span{
      background:var(--green-bg);
      color:var(--green);
      padding:10px 14px;
      border-radius:999px;
      font-weight:850;
    }

    .loading-box{
      background:var(--white);
      border-radius:24px;
      padding:40px;
      text-align:center;
      box-shadow:0 12px 30px rgba(90,40,15,.1);
      margin-top:20px;
    }

    .error-box{
      background:#fff0f0;
      color:#b42318;
      border:2px solid #fda29b;
      border-radius:24px;
      padding:24px;
      margin-top:20px;
      font-weight:700;
    }

    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:22px}

    .skeleton-card{
      height:320px;
      border-radius:32px;
      background:linear-gradient(90deg,#f7e7dc 25%,#fff7f2 50%,#f7e7dc 75%);
      background-size:200% 100%;
      animation:skeleton 1.4s infinite linear;
    }

    @keyframes skeleton{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }

    .roulette-stage{padding:30px;overflow:hidden;position:relative;margin-top:18px}
    .roulette-track{display:flex;gap:18px;will-change:transform}
    .roulette-item{min-width:240px;background:#fff7ed;border-radius:22px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 24px rgba(90,40,15,.08)}
    .roulette-item img{width:100%;height:160px;object-fit:cover}
    .roulette-item h3{padding:14px;margin:0;font-size:18px}
    .winner-result{margin-top:20px;display:flex;justify-content:center}
    .winner-result .card{border:5px solid var(--amber);box-shadow:0 0 36px rgba(255,183,3,.65),0 24px 60px rgba(90,40,15,.22)}
    .winner-pop{animation:winnerPop .45s ease}

    @keyframes winnerPop{
      0%{transform:scale(.9);opacity:0}
      70%{transform:scale(1.05);opacity:1}
      100%{transform:scale(1)}
    }

    .drawer{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;z-index:2500}
    .drawer.show{display:flex}
    .drawer-content{background:white;width:100%;max-height:90vh;overflow:auto;border-radius:28px 28px 0 0;padding:24px}
    .cook-step{font-size:24px;line-height:1.5;background:#fff7ed;padding:24px;border-radius:24px}
    .hidden{display:none}

    body.dark{
      --bg-1:#120b08;
      --bg-2:#2d1b12;
      --text:#fff7ed;
      --muted:#d8b49c;
      --card:#24140d;
      --white:#24140d;
      background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
      color:var(--text);
    }

    body.dark .ingredient,
    body.dark .step,
    body.dark .chip,
    body.dark .favorite-btn,
    body.dark .rating button,
    body.dark .roulette-item,
    body.dark .cook-step,
    body.dark select{
      background:#3a2115;
      color:#fff7ed;
    }

    body.dark .bottom-nav{background:rgba(36,20,13,.92);border-color:rgba(255,255,255,.08)}
    body.dark .hero-badge{background:#3a2115;color:#ffb37f}
    body.dark input,body.dark textarea{background:#24140d;color:#fff7ed}

    @media(max-width:760px){
      header{flex-direction:column;align-items:flex-start}
      .header-actions{width:100%;justify-content:space-between}
      .brand{font-size:24px}
      main{padding:16px 14px 150px}
      .hero{padding:24px}
      .columns{grid-template-columns:1fr}
      .detail img{height:280px}
      .roulette-item{min-width:170px}
      .roulette-item img{height:120px}
    }

    @media(max-width:520px){
      .grid{grid-template-columns:1fr}
      .card{max-width:none}
      .recipe-slider .card{min-width:84vw}
      h1{font-size:42px}
      .hero-stats{display:grid;grid-template-columns:repeat(3,1fr)}
      .hero-stat{min-width:0;padding:14px}
      .hero-stat strong{font-size:22px}
      .section-head{align-items:flex-start;flex-direction:column}
      .bottom-nav{justify-content:flex-start}
    }
  </style>
</head>

<body>
  <div id="toast" class="toast"></div>

  <nav class="bottom-nav">
    <button data-nav="home" onclick="showHome()">🏠<span>Home</span></button>
    <button data-nav="recipes" onclick="loadRecipes()">🍲<span>Rezepte</span></button>
    <button data-nav="favorites" onclick="loadFavorites()">❤️<span>Favoriten</span></button>
    <button data-nav="recent" onclick="loadRecentRecipes()">🕘<span>Zuletzt</span></button>
    <button data-nav="plan" onclick="loadWeeklyPlan()">📅<span>Plan</span></button>
    <button data-nav="list" onclick="loadShoppingList()">🛒<span>Liste</span></button>
    <button data-nav="rescue" onclick="loadFoodRescue()">♻️<span>Rescue</span></button>
  </nav>

  <header>
    <div class="brand">
      <img src="/static/images/Rezeptroulette.png" class="logo" alt="Logo">
      <span>Rezeptroulette</span>
    </div>
    <div class="header-actions">
      <button class="secondary" onclick="showHome()">Startseite</button>
      <button class="secondary" onclick="toggleDarkMode()">🌙</button>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-badge">🍽️ Smarte Rezeptplanung</div>
      <h1>Was essen wir heute?</h1>
      <p class="muted">Ziehe ein zufälliges Rezept, plane deine Woche, rette Lebensmittel und sammle Favoriten.</p>

      <div class="chips">
        <div class="chip">⚡ Schnell</div>
        <div class="chip">🥦 Vegetarisch</div>
        <div class="chip">🍝 Pasta</div>
        <div class="chip">🔥 Einfach</div>
      </div>

      <div class="hero-stats">
        <div class="hero-stat"><strong id="recipeCount">0</strong><span>Rezepte</span></div>
        <div class="hero-stat"><strong id="favoriteCount">0</strong><span>Favoriten</span></div>
        <div class="hero-stat"><strong>7</strong><span>Tage Planung</span></div>
      </div>

      <div class="buttons hero-buttons">
        <button class="primary big-cta" onclick="loadRoulette()">🎲 Rezept ziehen</button>
        <button class="secondary" onclick="loadRecipes()">🍲 Alle Rezepte</button>
        <button class="secondary" onclick="loadCreateRecipe()">➕ Rezept hinzufügen</button>
      </div>
    </section>

    <section id="content"></section>
  </main>

  <div class="drawer" id="cookDrawer">
    <div class="drawer-content">
      <button class="secondary" onclick="closeCookMode()">Schließen</button>
      <h2 id="cookTitle">Kochmodus</h2>
      <div class="cook-step" id="cookStep"></div>
      <div class="buttons">
        <button class="secondary" onclick="previousCookStep()">← Zurück</button>
        <button class="primary" onclick="nextCookStep()">Weiter →</button>
      </div>
    </div>
  </div>

  <script>
    let allRecipes = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]").map(Number);
    let ratings = JSON.parse(localStorage.getItem("ratings") || "{}");
    let recentRecipes = JSON.parse(localStorage.getItem("recentRecipes") || "[]");
    let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");
    let cookSteps = [];
    let cookIndex = 0;

    function imageUrl(recipe){
      const raw = recipe.image || recipe.bild || recipe.image_url;
      if(!raw) return "";
      return raw.startsWith("http") ? raw : `/static/images/${raw}`;
    }

    function showToast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }

    function setActiveNav(name){
      document.querySelectorAll(".bottom-nav button").forEach(b => b.classList.remove("active"));
      const active = document.querySelector(`[data-nav="${name}"]`);
      if(active) active.classList.add("active");
    }

    function showSkeleton(target){
      target.innerHTML = `
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      `;
    }

    function showHome(){
      setActiveNav("home");
      document.getElementById("home").classList.remove("hidden");
      updateStats();
      renderHomeSections();
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function hideHome(){
      document.getElementById("home").classList.add("hidden");
    }

    async function ensureRecipesLoaded(){
      try{
        if(!allRecipes.length){
          const response = await fetch("/rezepte");
          if(!response.ok) throw new Error("Serverfehler");
          allRecipes = await response.json();
        }
        updateStats();
        return allRecipes;
      }catch(error){
        document.getElementById("content").innerHTML = `
          <div class="error-box">
            ❌ Rezepte konnten nicht geladen werden.<br><br>
            Bitte später erneut versuchen.
          </div>
        `;
        throw error;
      }
    }

    function updateStats(){
      const rc = document.getElementById("recipeCount");
      const fc = document.getElementById("favoriteCount");
      if(rc) rc.textContent = allRecipes.length || 0;
      if(fc) fc.textContent = favorites.length || 0;
    }

    async function renderHomeSections(){
      const c = document.getElementById("content");

      try{
        await ensureRecipesLoaded();
        const recommended = allRecipes.slice(0,6);
        const recentPreview = recentRecipes.slice(0,3);

        c.innerHTML = `
          <div class="home-sections">
            <section>
              <div class="section-head">
                <div>
                  <h2>Heute empfohlen</h2>
                  <p class="muted">Schnelle Ideen für dein nächstes Lieblingsessen.</p>
                </div>
                <button class="secondary" onclick="loadRecipes()">Alle ansehen</button>
              </div>

              ${recommended.length
                ? `<div class="recipe-slider">${recommended.map(recipeCard).join("")}</div>`
                : `<div class="empty-state">Noch keine Rezepte geladen.</div>`}
            </section>

            <section class="smart-card">
              <div class="hero-badge" style="background:rgba(255,255,255,.22);color:white;">✨ Smart Roulette</div>
              <h2>Keine Idee? Lass die App entscheiden.</h2>
              <p>Wähle eine Stimmung oder lass dich komplett überraschen.</p>

              <div class="smart-tags">
                <button onclick="smartRouletteByTime(20)">⚡ Unter 20 Min</button>
                <button onclick="smartRouletteByDifficulty('Einfach')">😌 Einfach</button>
                <button onclick="smartRouletteVeggie()">🥦 Vegetarisch</button>
              </div>

              <button class="secondary" onclick="smartRoulette()">🎲 Komplett zufällig</button>
            </section>

            <section class="rescue-card">
              <p class="hero-badge">♻️ Food Rescue</p>
              <h2>Was ist noch im Kühlschrank?</h2>
              <p class="muted">Gib deine übrigen Zutaten ein und finde passende Rezepte.</p>

              <div class="rescue-chips">
                <span>Tomaten</span>
                <span>Käse</span>
                <span>Reis</span>
                <span>Paprika</span>
              </div>

              <button class="primary" onclick="loadFoodRescue()">Lebensmittel retten</button>
            </section>

            <section>

    function renderRecipes(){

      const grid = document.getElementById("recipeGrid");

               (!kitchen || r.kueche === kitchen) &&
               (!favoriteOnly || isFavorite(r.id));

      grid.innerHTML = filtered.length

    async function loadRoulette(){
      setActiveNav("home");
      hideHome();
      const c = document.getElementById("content");
      await ensureRecipesLoaded();

      if(!allRecipes.length){
        c.innerHTML = `<div class="empty-state">Keine Rezepte vorhanden.</div>`;
        return;
      }

      const winner = allRecipes[Math.floor(Math.random() * allRecipes.length)];
      const rouletteRecipes = [];
      for(let i = 0; i < 22; i++) rouletteRecipes.push(allRecipes[Math.floor(Math.random() * allRecipes.length)]);

      c.innerHTML = `
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>🎲 Rezept-Roulette</h2>
        <div class="roulette-stage">
          <div class="roulette-track" id="rouletteTrack">
            ${rouletteRecipes.map(r => `
              <div class="roulette-item">
                ${imageUrl(r) ? `<img src="${imageUrl(r)}" alt="${r.name}">` : `<div class="placeholder">Kein Bild</div>`}
                <h3>${r.name}</h3>
              </div>
            `).join("")}
          </div>
        </div>
      `;

      const track = document.getElementById("rouletteTrack");
      let pos = 0;
      let speed = 48;

      const spin = setInterval(() => {
        pos -= speed;
        track.style.transform = `translateX(${pos}px)`;
        speed *= .985;

        if(speed < 1.2){
          clearInterval(spin);
          const result = document.createElement("div");
          result.innerHTML = `
            <h2 class="winner-title">🎉 Dein Treffer</h2>
            <div class="winner-result winner-pop">${recipeCard(winner)}</div>
            <div class="buttons">
              <button class="primary" onclick="loadRoulette()">🔁 Nochmal drehen</button>
              <button class="secondary" onclick="showRecipe(${winner.id})">🍽️ Rezept ansehen</button>
            </div>
          `;
          c.appendChild(result);
          showToast("Rezept gezogen!");
        }
      },16);
    }

      const winner = source[Math.floor(Math.random() * source.length)];
      showRecipe(winner.id);
      showToast("Smart Roulette hat gewählt!");

      await ensureRecipesLoaded();

      const shuffled = [...allRecipes].sort(() => Math.random() - .5).slice(0,7);

    async function findRescueRecipes(){
      const input = document.getElementById("rescueInput").value;
      const available = input.split(/\n|,|;/).map(x => x.trim().toLowerCase()).filter(Boolean);
      if(!available.length) return showToast("Bitte Zutaten eingeben.");
      await ensureRecipesLoaded();

      const results = allRecipes.map(recipe => {
        const ingredients = (recipe.zutaten || []).map(z => z.toLowerCase());
        const matches = available.filter(a => ingredients.some(i => i.includes(a)));
        return {recipe,matches,score:matches.length};
      }).filter(r => r.score > 0).sort((a,b) => b.score - a.score).slice(0,8);

      document.getElementById("rescueResults").innerHTML = results.length
        ? `<h2>Passende Rezepte</h2><div class="grid">${results.map(r => `
            <div class="card" onclick="showRecipe(${r.recipe.id})">
              ${imageUrl(r.recipe) ? `<img src="${imageUrl(r.recipe)}" alt="${r.recipe.name}">` : `<div class="placeholder">Kein Bild</div>`}
              <div class="card-body">
                <span class="badge">${r.score} Treffer</span>
                <h3>${r.recipe.name}</h3>
                <div class="meta">Passt zu: ${r.matches.join(", ")}</div>
                <div class="card-actions">
                  <button class="primary" onclick="event.stopPropagation(); showRecipe(${r.recipe.id})">Rezept ansehen</button>
                  <button class="secondary" onclick="event.stopPropagation(); quickAddToPlan(${r.recipe.id})">📅 Planen</button>
                </div>
              </div>
            </div>`).join("")}</div>`
        : `<div class="empty-state"><h2>Keine passenden Rezepte gefunden</h2><p>Versuche allgemeinere Zutaten wie Reis, Käse oder Tomaten.</p></div>`;
    }

    async function saveNewRecipe(){
      const payload = {
        name:document.getElementById("newName").value.trim(),
        kueche:document.getElementById("newKitchen").value.trim(),
        bild:document.getElementById("newImage").value.trim(),
        portionen:Number(document.getElementById("newPortions").value || 2),
        kochzeit:Number(document.getElementById("newTime").value || 30),
        schwierigkeit:document.getElementById("newDifficulty").value,
        tags:document.getElementById("newTags").value.split(",").map(x => x.trim()).filter(Boolean),
        zutaten:document.getElementById("newIngredients").value.split("\n").map(x => x.trim()).filter(Boolean),
        anleitung:document.getElementById("newInstructions").value.trim()
      };

      if(!payload.name) return showToast("Bitte Rezeptnamen eingeben.");
      if(!payload.zutaten.length) return showToast("Bitte mindestens eine Zutat eingeben.");

      const response = await fetch("/rezept-erstellen",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });

      if(!response.ok) return showToast("Rezept konnte nicht gespeichert werden.");

      const savedRecipe = await response.json();
      allRecipes = [];
      await ensureRecipesLoaded();
      showToast("Rezept gespeichert!");
      showRecipe(savedRecipe.id);
    }

    if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");

    fetch("/rezepte")
      .then(r => r.json())
      .then(data => {
        allRecipes = data;
        updateStats();
        renderHomeSections();
      })
      .catch(() => {
        document.getElementById("content").innerHTML = `
          <div class="error-box">❌ Rezepte konnten nicht geladen werden.</div>
        `;
      });

    showHome();
  </script>
</body>
</html>
