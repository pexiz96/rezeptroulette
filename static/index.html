<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezeptroulette</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#ff6b35">

  <style>
    *{box-sizing:border-box}

    :root{
      --bg:#fff3e7;
      --text:#2d1b12;
      --muted:#7c4a2d;
      --white:#fff;
      --cream:#fff7ed;
      --orange:#ff6b35;
      --amber:#ff9f1c;
      --green:#22a05a;
      --shadow:0 18px 50px rgba(90,40,15,.12);
      --soft:0 8px 24px rgba(90,40,15,.08);
      --line:rgba(90,40,15,.12);
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(135deg,#fff8f0,#ffe3d1);
      color:var(--text);
      min-height:100vh;
      letter-spacing:-.02em;
    }

    button,input,select,textarea{font:inherit}

    button{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 22px;
      font-weight:850;
      transition:.2s ease;
    }

    button:hover{transform:translateY(-2px)}
    button:active{transform:scale(.97)}

    input,select,textarea{
      padding:14px 16px;
      border:none;
      border-radius:16px;
      background:var(--white);
      box-shadow:var(--soft);
      color:var(--text);
    }

    textarea{width:100%;min-height:150px;resize:vertical}
    select{width:100%;margin-top:14px;background:var(--cream)}


    .primary{
      color:white;
      background:linear-gradient(135deg,var(--orange),var(--amber));
      box-shadow:0 12px 30px rgba(255,107,53,.28);
    }

    .secondary{
      background:var(--white);
      color:var(--text);
      box-shadow:var(--soft);
    }

    .muted,.meta,.week-empty{color:var(--muted)}

    .top-nav{
      position:sticky;
      top:14px;
      z-index:1000;
      width:min(1120px,calc(100% - 28px));
      margin:14px auto 0;
      padding:10px;
      display:flex;
      gap:8px;
      justify-content:center;
      align-items:center;
      overflow-x:auto;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(22px);
      border:1px solid rgba(255,255,255,.6);
      border-radius:28px;
      box-shadow:var(--soft);
    }

    .top-nav button{
      background:transparent;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:8px;
      padding:13px 18px;
      box-shadow:none;
      white-space:nowrap;
    }

    .top-nav button.active{
      background:var(--white);
      box-shadow:var(--soft);
      color:var(--orange);
    }

    header{
      width:min(1200px,calc(100% - 32px));
      margin:28px auto 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      padding:0 4px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      font-size:28px;
      font-weight:950;
    }

    .logo{
      width:52px;
      height:52px;
      object-fit:cover;
      border-radius:50%;
    }

    .header-actions{display:flex;gap:12px}

    main{
      width:min(1200px,calc(100% - 32px));
      margin:34px auto 0;
      padding-bottom:100px;
    }

    h1{
      font-size:clamp(46px,6vw,78px);
      line-height:.98;
      letter-spacing:-.06em;
      margin:24px 0 16px;
      font-weight:950;
    }

    h2{margin:0;font-size:34px;letter-spacing:-.04em}

    .hero{
      position:relative;
      overflow:hidden;
      background:rgba(255,255,255,.92);
      border-radius:32px;
      padding:56px 52px;
      box-shadow:var(--shadow);
      margin-bottom:54px;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:330px;
      height:330px;
      right:-90px;
      top:-130px;
      border-radius:50%;
      background:rgba(255,183,3,.18);
    }

    .hero > *{position:relative;z-index:1}

    .hero-badge,.badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#fff0e6;
      color:#d95d20;
      padding:10px 16px;
      border-radius:999px;
      font-weight:900;
    }

    .hero .muted{max-width:650px;font-size:20px;line-height:1.45;margin:0}

    .hero-action-grid{
      margin-top:34px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    .hero-action{
      height:116px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
      padding:26px;
      font-size:34px;
      text-align:left;
    }

    .hero-action span{display:flex;flex-direction:column;gap:4px}
    .hero-action strong{font-size:23px}
    .hero-action small{font-size:15px;font-weight:650;opacity:.75}

    .section-head{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px}
    .section-head .muted{margin:8px 0 0;font-size:17px}

    .clean-recipe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}

    .card{
      background:var(--white);
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
      cursor:pointer;
      position:relative;
      transition:.25s ease;
    }

    .card:hover{transform:translateY(-4px)}
    .card img,
.week-image,
.detail img,
.roulette-image-wrap img{
  width:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  background:var(--cream);
}

.card img{
  height:280px;
  aspect-ratio:4 / 3;
}

    .card-body{padding:24px}
    .card h3{margin:0;font-size:28px;line-height:1.12;min-height:64px;letter-spacing:-.04em}

    .meta{display:flex;flex-wrap:wrap;gap:10px;font-size:16px;margin:14px 0 22px}
    .full-btn{width:100%;height:58px;font-size:19px}

    .favorite-row{position:absolute;top:16px;right:16px;z-index:10}
    .favorite-btn{width:46px;height:46px;padding:0;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:var(--soft)}

    .home-benefits{margin-top:44px;padding:24px 30px;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
    .home-benefits div{display:grid;gap:4px}
    .home-benefits span{color:var(--muted);font-size:14px}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:22px}
    .card-actions,.buttons,.filters{display:flex;flex-wrap:wrap;gap:12px}
    .filters{margin:18px 0}

    .favorite-filter{display:flex;align-items:center;gap:8px;background:var(--white);padding:12px 16px;border-radius:14px;box-shadow:var(--soft)}

    .placeholder{height:220px;background:linear-gradient(135deg,var(--orange),var(--amber));display:grid;place-items:center;color:white;font-weight:900}

    .detail{background:var(--white);border-radius:32px;overflow:hidden;box-shadow:var(--shadow);margin-top:22px}
    .detail img{
  width:100%;
  aspect-ratio: 16 / 9;
  height:auto;
  object-fit:cover;
  object-position:center center;
  display:block;
}
    .detail-body{padding:30px;display:flex;flex-direction:column;gap:18px}
    .columns{display:grid;grid-template-columns:.8fr 1.2fr;gap:28px}

    .ingredients,.steps,.shopping-list{display:grid;gap:12px}
    .ingredient,.step,.shopping-item,.chip{background:var(--cream);padding:14px 16px;border-radius:16px;box-shadow:0 6px 18px rgba(90,40,15,.06);font-weight:650}

    .ingredient-builder{display:grid;gap:10px}
    .ingredient-main{font-weight:900}
    .ingredient-alt-box{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:14px}
    .ingredient-alt-box span{color:var(--muted);font-weight:850}
    .alt-btn{padding:7px 11px;border-radius:999px;background:#ecfdf3;color:#067647;box-shadow:none;font-size:13px}
    .alt-btn:hover{transform:translateY(-1px)}

    .chips{display:flex;flex-wrap:wrap;gap:12px}
    .shopping-item{display:flex;align-items:center;gap:12px}
    .shopping-item:has(input:checked){opacity:.55;text-decoration:line-through}
    .week-image{
  width:100%;
  aspect-ratio: 16 / 10;
  height:auto;
  object-fit:cover;
  object-position:center center;
  border-radius:18px;
  margin-bottom:14px;
}
    .week-title{font-size:18px;font-weight:850}

    .rating{display:flex;gap:6px;flex-wrap:wrap}
    .rating button{background:var(--cream);padding:8px 10px;border-radius:12px;font-size:22px;box-shadow:none}

    .toast{position:fixed;top:20px;right:20px;background:var(--text);color:white;padding:14px 18px;border-radius:16px;opacity:0;transform:translateY(-10px);transition:.25s;z-index:3000}
    .toast.show{opacity:1;transform:translateY(0)}

    .empty-state,.panel,.rescue-card{background:var(--white);border-radius:32px;padding:30px;box-shadow:var(--soft)}
    .error-box{background:#fff0f0;color:#b42318;border:2px solid #fda29b;border-radius:24px;padding:24px;margin-top:20px;font-weight:700}

    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:22px}
    .skeleton-card{height:320px;border-radius:32px;background:linear-gradient(90deg,#f7e7dc 25%,#fff7f2 50%,#f7e7dc 75%);background-size:200% 100%;animation:skeleton 1.4s infinite linear}
    @keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}

    .drawer{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;z-index:2500}
    .drawer.show{display:flex}
    .drawer-content{background:white;width:100%;max-height:90vh;overflow:auto;border-radius:28px 28px 0 0;padding:24px}
    .cook-step{font-size:24px;line-height:1.5;background:var(--cream);padding:24px;border-radius:24px}
    .hidden{display:none}

    .clean-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .clean-actions button{width:100%;padding:13px 14px}
    .card .meta{min-height:22px}
    .back-btn{margin-bottom:22px}

    /* Roulette Premium Layout */
    .roulette-page{max-width:1080px;margin:0 auto}

    .roulette-header{
      background:rgba(255,255,255,.92);
      border-radius:34px;
      padding:42px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }

    .roulette-header h1{margin:18px 0 10px}

    .roulette-shell{
      display:grid;
      grid-template-columns:1fr 170px;
      gap:28px;
      align-items:center;
      margin-bottom:30px;
    }

    .meal-filter-panel{
      background:rgba(255,255,255,.55);
      border:1px solid rgba(255,255,255,.72);
      border-radius:34px;
      padding:22px;
      box-shadow:var(--soft);
    }

    .meal-filter-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      color:var(--muted);
      font-size:14px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .meal-filter-wrap{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:20px 22px;
  align-items:start;
  justify-items:center;
}

    .meal-circle{
      all:unset;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      gap:9px;
      min-height:104px;
      border-radius:28px;
      transition:.22s ease;
    }

    .meal-circle .meal-icon{
      width:70px;
      height:70px;
      min-width:70px;
      min-height:70px;
      border-radius:50%;
      background:var(--white);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      line-height:1;
      box-shadow:0 12px 30px rgba(90,40,15,.12);
      transition:.22s ease;
    }

    .meal-circle span{font-size:14px;font-weight:900;color:var(--text)}
    .meal-circle:hover .meal-icon{transform:translateY(-4px)}
    .meal-circle.active .meal-icon{background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;box-shadow:0 16px 38px rgba(255,107,53,.35)}
    .meal-circle.active span{color:var(--orange)}

    .roulette-draw-btn{
      all:unset;
      cursor:pointer;
      width:168px;
      height:168px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--orange),var(--amber));
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-align:center;
      font-weight:950;
      box-shadow:0 24px 50px rgba(255,107,53,.3);
      transition:.22s ease;
    }

    .roulette-draw-btn:hover{transform:translateY(-4px) scale(1.02)}
    .roulette-draw-btn:active{transform:scale(.97)}
    .roulette-draw-btn .dice{font-size:32px}
    .roulette-draw-btn span{font-size:17px;line-height:1.15}

    .roulette-result-card{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      min-height:380px;
      overflow:hidden;
      background:var(--white);
      border-radius:34px;
      box-shadow:var(--shadow);
    }

    .roulette-image-wrap{min-height:380px;background:var(--cream);overflow:hidden}
    .roulette-image-wrap img,
.roulette-image-wrap .placeholder{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

    .roulette-result-body{padding:48px;display:flex;flex-direction:column;justify-content:center;gap:4px}
    .roulette-result-body h2{font-size:42px;line-height:1.05;margin:18px 0;letter-spacing:-.05em}

    /* Dark mode */
    body.dark{
      --bg:#120b08;
      --text:#fff7ed;
      --muted:#d8b49c;
      --white:#24140d;
      --cream:#3a2115;
      --line:rgba(255,255,255,.1);
      background:linear-gradient(135deg,#120b08,#2d1b12);
      color:var(--text);
    }

    body.dark .top-nav{background:rgba(45,27,18,.88);border-color:rgba(255,255,255,.08)}
    body.dark .top-nav button{color:#fff7ed}
    body.dark .top-nav button.active{background:#3a2115;color:#ff9f1c}
    body.dark .hero,body.dark .panel,body.dark .empty-state,body.dark .rescue-card,body.dark .detail,body.dark .card,body.dark .roulette-header,body.dark .roulette-result-card,body.dark .drawer-content{background:#24140d;color:#fff7ed}
    body.dark .meal-filter-panel{background:rgba(36,20,13,.62);border-color:rgba(255,255,255,.08)}
    body.dark .hero-badge,body.dark .badge{background:#3a2115;color:#ff9f1c}
    body.dark .secondary{background:#3a2115;color:#fff7ed;box-shadow:0 8px 24px rgba(0,0,0,.28)}
    body.dark .card-body{background:#24140d}
    body.dark .meta,body.dark .muted,body.dark .week-empty{color:#d8b49c}
    body.dark .home-benefits{border-top-color:rgba(255,255,255,.1)}
    body.dark .home-benefits span{color:#d8b49c}
    body.dark .placeholder{background:linear-gradient(135deg,#5b2a18,#8a3f1d)}
    body.dark input,body.dark select,body.dark textarea,body.dark .favorite-filter{background:#1a0f0a;color:#fff7ed;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    body.dark input::placeholder,body.dark textarea::placeholder{color:#a9826a}
    body.dark .ingredient,body.dark .step,body.dark .shopping-item,body.dark .chip,body.dark .cook-step,body.dark .rating button{background:#3a2115;color:#fff7ed}
    body.dark .favorite-btn{background:#3a2115;color:#fff7ed}
    body.dark .meal-circle .meal-icon{background:#2a1811;color:#fff7ed}
    body.dark .meal-circle.active .meal-icon{background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff}
    body.dark .error-box{background:#3a120f;color:#ffb4a8;border-color:#7a271a}
    body.dark .skeleton-card{background:linear-gradient(90deg,#24140d 25%,#3a2115 50%,#24140d 75%);background-size:200% 100%}
    body.dark .drawer{background:rgba(0,0,0,.65)}

    @media(max-width:900px){
      header{flex-direction:column;align-items:flex-start}
      .header-actions{width:100%;justify-content:space-between}
      .hero{padding:34px 24px}
      .hero-action-grid,.clean-recipe-grid,.home-benefits,.columns{grid-template-columns:1fr}
      .detail img{height:280px}
      .roulette-shell{grid-template-columns:1fr}
      .roulette-draw-btn{width:100%;height:64px;border-radius:999px;flex-direction:row}
      .roulette-draw-btn .dice{font-size:22px}
      .roulette-result-card{grid-template-columns:1fr}
      .roulette-image-wrap img,.roulette-image-wrap .placeholder{min-height:260px;height:260px}
      .roulette-result-body{padding:28px}
    }

    @media(max-width:560px){
      main{width:min(100% - 22px,1200px)}
      .roulette-header{padding:28px 22px}
      .meal-filter-panel{padding:18px 14px}
      .meal-filter-wrap{grid-template-columns:repeat(3,1fr);gap:14px 8px}
      .meal-circle .meal-icon{width:62px;height:62px;min-width:62px;min-height:62px;font-size:26px}
      .meal-circle span{font-size:13px}
      h1{font-size:44px}
    }

    .modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.hidden {
  display: none;
}

.modal-box {
  background: white;
  padding: 24px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.modal-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.modal-grid button {
  padding: 12px;
  border: none;
  border-radius: 14px;
  background: #f3f3f3;
  cursor: pointer;
  font-weight: bold;
}

.modal-grid button:hover {
  background: #e5e5e5;
}
  </style>
</head>

<body>
  <div id="toast" class="toast"></div>

  <nav class="top-nav">
    <button data-nav="home" onclick="showHome()">🏠<span>Home</span></button>
    <button data-nav="recipes" onclick="loadRecipes()">🍲<span>Rezepte</span></button>
    <button data-nav="favorites" onclick="loadFavorites()">❤️<span>Favoriten</span></button>
    <button data-nav="recent" onclick="loadRecentRecipes()">🕘<span>Zuletzt</span></button>
    <button data-nav="plan" onclick="loadWeeklyPlan()">📅<span>Plan</span></button>
    <button data-nav="list" onclick="loadShoppingList()">🛒<span>Liste</span></button>
    <button data-nav="rescue" onclick="loadFoodRescue()">♻️<span>Rescue</span></button>
    <button data-nav="import" onclick="loadRecipeImport()">🔗<span>Import</span></button>
  </nav>

  <header>
    <div class="brand">
      <img src="/static/images/Rezeptroulette.png" class="logo" alt="Logo">
      <span>Rezeptroulette</span>
    </div>
    <div class="header-actions">
      <button class="secondary" onclick="showHome()">Startseite</button>
      <button class="secondary" onclick="toggleDarkMode()">🌙</button>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-badge">🍽️ Rezeptroulette</div>
      <h1>Was essen wir heute?</h1>
      <p class="muted">Finde schnell ein Rezept, plane deine Woche oder rette Lebensmittel aus deinem Kühlschrank.</p>

      <div class="hero-action-grid">
        <button class="hero-action primary" onclick="loadRoulette()">
          🎲 <span><strong>Rezept ziehen</strong><small>Zufälliges Rezept entdecken</small></span>
        </button>
        <button class="hero-action secondary" onclick="loadRecipes()">
          🍲 <span><strong>Alle Rezepte</strong><small>Alle Rezepte ansehen</small></span>
        </button>
        <button class="hero-action secondary" onclick="loadFoodRescue()">
          ♻️ <span><strong>Food Rescue</strong><small>Rette Lebensmittel</small></span>
        </button>
      </div>
    </section>

    <section id="content"></section>
  </main>

  <div class="drawer" id="cookDrawer">
    <div class="drawer-content">
      <button class="secondary" onclick="closeCookMode()">Schließen</button>
      <h2 id="cookTitle">Kochmodus</h2>
      <div class="cook-step" id="cookStep"></div>
      <div class="buttons">
        <button class="secondary" onclick="previousCookStep()">← Zurück</button>
        <button class="primary" onclick="nextCookStep()">Weiter →</button>
      </div>
    </div>
  </div>

  <script>
    let allRecipes = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]").map(Number);
    let ratings = JSON.parse(localStorage.getItem("ratings") || "{}");
    let recentRecipes = JSON.parse(localStorage.getItem("recentRecipes") || "[]");
    let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");
    let cookSteps = [];
    let recipeScrollPosition = 0;
    let selectedMealType = "Alle";
    let cookIndex = 0;
    let rouletteHistory = JSON.parse(localStorage.getItem("rouletteHistory") || "[]").map(Number);

    const ingredientAlternatives = {
      "mehl": ["Dinkelmehl", "Hafermehl", "Mandelmehl", "Vollkornmehl"],
      "milch": ["Mandelmilch", "Hafermilch", "Sojamilch", "laktosefreie Milch"],
      "sahne": ["Cremefine", "Hafercuisine", "Kokosmilch"],
      "butter": ["Margarine", "Olivenöl", "Kokosöl"],
      "zucker": ["Erythrit", "Honig", "Ahornsirup", "Agavendicksaft"],
      "ei": ["Apfelmus", "Leinsamen-Ei", "Banane"],
      "eier": ["Apfelmus", "Leinsamen-Ei", "Banane"],

    function normalizeIngredientText(text){
      return String(text || "").toLowerCase().replaceAll("ä","ae").replaceAll("ö","oe").replaceAll("ü","ue").replaceAll("ß","ss");
    }

    function getIngredientAlternatives(ingredient){
      const text = normalizeIngredientText(ingredient);
      for(const key in ingredientAlternatives){
        if(text.includes(normalizeIngredientText(key))) return ingredientAlternatives[key];
      }
      return [];
    }

    function renderIngredientBlock(ingredient){
      const alternatives = getIngredientAlternatives(ingredient);
      return `

          ${alternatives.length ? `

            </div>` : ""}
        </div>`;
    }

    function cleanRecipeText(text){
      let value = String(text || "").replace(/[\u{1F300}-\u{1FAFF}]/gu, "").replace(/\s+/g, " ").replace(/\s*-\s*/g, "-").trim();
      const fixes = {
        "Blaubeer-Protei N-Dessert":"Blaubeer-Protein-Dessert",
        "Fluffige Erdbeer-Protei Ncrem E":"Fluffige Erdbeer-Proteincreme",
        "Crem Ige Cham Pignon-Brokkoli-Pasta M It":"Cremige Champignon-Brokkoli-Pasta",
        "Gefrorenes Skyr-Dessert M It Protein & Schokolade":"Gefrorenes Skyr-Dessert mit Protein & Schokolade",
        "High-Protei N Krä Ute Rquark M I T":"High-Protein Kräuterquark",
        "High Prot E I N Waf F E L N":"High-Protein Waffeln",
        "High-Protein Corn Dogs M It Käse":"High-Protein Corn Dogs mit Käse",
        "High-Protein Gnocchi In Crem Iger Tomaten-":"High-Protein Gnocchi in cremiger Tomatensoße",
        "Kartoffel-Spinat-Auflauf M It Fischstäbchen":"Kartoffel-Spinat-Auflauf mit Fischstäbchen",
        "Knoblauchbutter-Hähnchenbissen M It":"Knoblauchbutter-Hähnchenbissen",
        "Him Beer-Chia-Quark":"Himbeer-Chia-Quark"
      };
      if(fixes[value]) return fixes[value];
      return value.replace(/\bProtei\s*N\b/gi,"Protein").replace(/\bProt\s*E\s*I\s*N\b/gi,"Protein").replace(/\bWaf\s*F\s*E\s*L\s*N\b/gi,"Waffeln").replace(/\bM\s*It\b/gi,"mit").replace(/\bM\s*I\s*T\b/gi,"mit").replace(/\bCrem\s*Ige\b/gi,"Cremige").replace(/\bCrem\s*Iger\b/gi,"cremiger").replace(/\bCham\s*Pignon\b/gi,"Champignon").replace(/\bKrä\s*Ute\s*Rquark\b/gi,"Kräuterquark").replace(/\bNcrem\s*E\b/gi,"ncreme").replace(/\s+/g," ").trim();
    }

function renderRecipes(){
  const search = document.getElementById("searchInput")?.value.toLowerCase() || "";
  const grid = document.getElementById("recipeGrid");
  if(!grid) return;

  const selected = selectedRecipeFilter;

  const filtered = allRecipes.filter(r => {
    const ingredientText = (r.zutaten || []).join(" ").toLowerCase();
    const tagText = (r.tags || []).join(" ").toLowerCase();

    const text = [
  r.name || "",
  r.kueche || "",
  r.kategorie || "",
  r.anleitung || "",
  ...(r.tags || []),
  ...(r.zutaten || [])
].join(" ").toLowerCase();

    let matchesCategory = true;

    if(selected !== "Alle"){
  if(selected === "Frühstück") matchesCategory =
    text.includes("frühstück") || text.includes("pancake") || text.includes("bowl") || text.includes("skyr") || text.includes("oats");

  if(selected === "Mittagessen") matchesCategory =
    text.includes("mittag") || text.includes("hauptgericht") || text.includes("herzhaft") || text.includes("reis") || text.includes("hähnchen");

  if(selected === "Abendbrot") matchesCategory =
    text.includes("abend") || text.includes("brot") || text.includes("wrap") || text.includes("toast") || text.includes("burger");

  if(selected === "Nudeln") matchesCategory =
    text.includes("nudel") || text.includes("pasta") || text.includes("spaghetti") || text.includes("makkaroni") || text.includes("tortellini");

  if(selected === "Auflauf") matchesCategory =
    text.includes("auflauf") || text.includes("gratin") || text.includes("überbacken");

  if(selected === "Suppe") matchesCategory =
    text.includes("suppe") || text.includes("eintopf");

  if(selected === "Vegetarisch") matchesCategory =
    text.includes("vegetarisch") || text.includes("veggie") || text.includes("gemüse");

  if(selected === "Snack") matchesCategory =
    text.includes("snack") || text.includes("wrap") || text.includes("toast") || text.includes("burger") || text.includes("fries");

  if(selected === "Dessert") matchesCategory =
    text.includes("dessert") || text.includes("süß") || text.includes("kuchen") || text.includes("erdbeer") || text.includes("schoko") || text.includes("oreo");
}

    return (
      (!search ||
        String(r.name || "").toLowerCase().includes(search) ||
        ingredientText.includes(search) ||
        tagText.includes(search))
      && matchesCategory
    );
  });

  grid.innerHTML = filtered.length
    ? filtered.map(recipeCard).join("")
    : `<div class="empty-state"><h2>Keine Rezepte gefunden</h2><p>Versuche einen anderen Filter oder Suchbegriff.</p></div>`;
}

function formatSteps(anleitung){
  return String(anleitung || "Keine Anleitung vorhanden.")
    .replaceAll("\\n", "\n")
    .split(/\n|(?=\d+\.\s)/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(s => `<div class="step">${s}</div>`)
    .join("");
}

        </div>

        <div class="roulette-result-body">
          <span class="badge">🎰 Dreht...</span>
          <h2>${cleanRecipeText(tempRecipe.name)}</h2>
        </div>
      </div>
    `;

    spinCount++;

    if(spinCount >= spinMax){
      clearInterval(spinner);

      const winner = availablePool[Math.floor(Math.random() * availablePool.length)];

      rouletteHistory.unshift(Number(winner.id));
      const maxHistory = Math.min(12, Math.floor(pool.length * 0.7));
      rouletteHistory = rouletteHistory.slice(0, maxHistory);
      localStorage.setItem("rouletteHistory", JSON.stringify(rouletteHistory));

      const img = imageUrl(winner);

      result.innerHTML = `
        <div class="roulette-result-card">
          <div class="roulette-image-wrap">
            ${img ? `<img src="${img}" alt="${winner.name}">` : `<div class="placeholder">Kein Bild</div>`}
          </div>

          <div class="roulette-result-body">
            <span class="badge">🎉 Dein Treffer</span>
            <h2>${cleanRecipeText(winner.name)}</h2>

            <div class="meta">
              ${winner.kueche && winner.kueche !== "PDF Import"
                ? `<span>🌍 ${winner.kueche}</span>`
                : ""}
              <span>⏱️ ${winner.kochzeit || "?"} Min</span>
              <span>🔥 ${winner.schwierigkeit || "Einfach"}</span>
            </div>

            <div class="buttons">
              <button class="primary" onclick="showRecipe(${winner.id})">Rezept öffnen</button>

              <button class="secondary" onclick="quickAddToPlan(${winner.id})">
                📅 Zum Wochenplan
              </button>

              <button class="secondary" onclick="drawRouletteRecipe()">
                🔁 Nochmal ziehen
              </button>
            </div>
          </div>
        </div>
      `;
    }
  }, 120);
}

    async async function autoFillWeek(){
  showToast("Woche wird automatisch geplant...");

  await ensureRecipesLoaded();

  const days = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
  const slots = [
    {id: 1, name: "Frühstück"},
    {id: 2, name: "Mittag"},
    {id: 3, name: "Abend"}
  ];

  for(const day of days){
    for(const slot of slots){
      let pool = allRecipes.filter(recipe => recipeMatchesSlot(recipe, slot));

      if(!pool.length){
        console.warn(`Keine passenden Rezepte für ${slot.name}. Fallback: alle Rezepte.`);
        pool = allRecipes;
      }

      if(!pool.length) continue;

      const recipe = pool[Math.floor(Math.random() * pool.length)];
      if(!recipe) continue;

      const response = await fetch(`/wochenplan/${encodeURIComponent(day)}/${slot.id}/${Number(recipe.id)}`, {
        method: "POST"
      });

      if(!response.ok){
        const errorText = await response.text();
        console.error("Speichern fehlgeschlagen:", day, slot.id, recipe.name, response.status, errorText);
      }
    }
  }

  showToast("Woche automatisch geplant!");
  await loadWeeklyPlan();
}

  function recipeMatchesSlot(recipe, slot){
  const text = [
    recipe.name || "",
    recipe.kueche || "",
    recipe.kategorie || "",
    recipe.anleitung || "",
    ...(recipe.tags || []),
    ...(recipe.zutaten || [])
  ].join(" ").toLowerCase();

  if(slot.name === "Frühstück"){
    return text.includes("frühstück") || text.includes("pancake") || text.includes("skyr") || text.includes("bowl") || text.includes("oats") || text.includes("porridge") || text.includes("waffel") || text.includes("bagel") || text.includes("joghurt") || text.includes("quark");
  }

  if(slot.name === "Mittag"){
    return text.includes("mittag") || text.includes("hauptgericht") || text.includes("herzhaft") || text.includes("nudel") || text.includes("pasta") || text.includes("reis") || text.includes("hähnchen") || text.includes("auflauf") || text.includes("suppe") || text.includes("pfanne") || text.includes("kartoffel");
  }

  if(slot.name === "Abend"){
    return text.includes("abend") || text.includes("abendbrot") || text.includes("brot") || text.includes("toast") || text.includes("wrap") || text.includes("burger") || text.includes("snack") || text.includes("salat") || text.includes("sandwich");
  }

  return false;
}

    async function findRescueRecipes(){
  const input = document.getElementById("rescueInput").value;

  const available = input
    .split(/\n|,|;/)
    .map(x => x.trim().toLowerCase())
    .filter(Boolean);

  if(!available.length) return showToast("Bitte Zutaten eingeben.");

  await ensureRecipesLoaded();

  const existingResults = allRecipes.map(recipe => {
    const recipeIngredients = (recipe.zutaten || [])
      .map(z => String(z).toLowerCase());

    const matches = available.filter(item =>
      recipeIngredients.some(zutat => zutat.includes(item))
    );

    return { recipe, matches, score: matches.length };
  })
  .filter(r => r.score > 0)
  .sort((a,b) => b.score - a.score);

  const rescueIdeas = createRescueIdeasStrict(available);

  document.getElementById("rescueResults").innerHTML = `
    <h2>♻️ Food-Rescue-Ideen</h2>

    ${rescueIdeas.length ? `
      <div class="grid">
        ${rescueIdeas.map(rescueIdeaCard).join("")}
      </div>
    ` : ""}

    ${existingResults.length ? `
      <h2 style="margin-top:34px;">📚 Rezepte mit deinen Lebensmitteln</h2>
      <div class="grid">
        ${existingResults.map(r => recipeCard(r.recipe)).join("")}
      </div>

        <h2>Keine gespeicherten Rezepte gefunden</h2>
        <p>Ich habe aber oben passende Ideen aus deinen Zutaten erstellt.</p>
      </div>
    `}
  `;
}

        "Die Nudeln unterheben.",
        "Mit Salz, Pfeffer und Gewürzen abschmecken.",
        "Warm servieren."
      ]
    });
  }

  if(text.includes("sahne")){
    ideas.push({
      name: "Cremige Sahnepfanne",
      icon: "🥘",
      ingredients: items,
      steps: [
        "Alle eingegebenen Zutaten klein schneiden.",
        "Eine Pfanne erhitzen und die festen Zutaten zuerst anbraten.",
        "Sahne dazugeben und alles kurz einköcheln lassen.",
        "Die Soße mit Salz, Pfeffer und Kräutern abschmecken.",
        "Alles gut vermengen.",
        "Heiß servieren."
      ]
    });
  }

  if(text.includes("ketchup") || text.includes("tomate")){
    ideas.push({
      name: "Tomatige Restepfanne",
      icon: "🍅",
