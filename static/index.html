<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rezeptroulette</title>

  <style>

    
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fff7ed, #ffe2cf);
      color: #2d1b12;
      min-height: 100vh;
    }

    header {
      max-width: 900px;
      margin: auto;
      padding: 28px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-size: 28px;
      font-weight: 900;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 20px 22px 50px;
    }

    .hero {
      background: rgba(255,255,255,0.75);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(90,40,15,0.15);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      margin: 0 0 12px;
      line-height: 1;
    }

    h2 {
      margin-top: 26px;
    }

    .muted {
      color: #7c4a2d;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 800;
    }

    .primary {
      color: white;
      background: linear-gradient(135deg, #ff6b35, #ffb703);
      box-shadow: 0 12px 30px rgba(255,107,53,0.3);
    }

    .secondary {
      background: white;
      color: #2d1b12;
      box-shadow: 0 8px 22px rgba(90,40,15,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 380px));
      gap: 18px;
      margin-top: 22px;
    }

    .card {
      transition: transform 0.18s ease, box-shadow 0.18s ease;  
      max-width: 420px;
      background: white;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(90,40,15,0.1);
    }

    .card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 44px rgba(90,40,15,0.18);
}

    .card img {
      transition: transform 0.25s ease;  
      width: 100%;
      height: 230px;
      object-fit: cover;
      display: block;
    }

    .card:hover img {
  transform: scale(1.04);
}

    .card-body {
      padding: 18px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .meta {
      color: #7c4a2d;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .placeholder {
      height: 180px;
      background: linear-gradient(135deg, #ff6b35, #ffb703);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
    }

    .detail {
      background: white;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(90,40,15,0.15);
      margin-top: 22px;
    }

    .detail img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
    }

    .detail-body {
      padding: 26px;
    }

    .columns {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 28px;
      margin-top: 20px;
    }

    .ingredients {
      display: grid;
      gap: 10px;
    }

    .ingredient {
      background: #fff7ed;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 650;
    }

    .steps {
      display: grid;
      gap: 12px;
    }

    .step {
      background: #fff7ed;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.5;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      padding: 14px 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      background: white;
      box-shadow: 0 8px 22px rgba(90,40,15,0.08);
    }
select {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: #fff7ed;
  font-size: 15px;
}

.favorite-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 10px;
}

.favorite-btn {
  background: #fff7ed;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  font-size: 20px;
  display: grid;
  place-items: center;
}

.favorite-btn:hover {
  transform: scale(1.08);
}

.favorite-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  background: white;
  padding: 12px 16px;
  border-radius: 14px;
  box-shadow: 0 8px 22px rgba(90,40,15,0.08);
}

.hidden {
  display: none;
}
    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .columns {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 24px;
      }
    }
    .bottom-nav {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 520px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  border-radius: 26px;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  box-shadow: 0 12px 40px rgba(90,40,15,0.15);
  z-index: 1000;
}

.bottom-nav button {
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: #7c4a2d;
  font-size: 13px;
  padding: 8px 12px;
}

.bottom-nav button:hover {
  background: #fff7ed;
}

.bottom-nav button.active {
  background: linear-gradient(135deg, #ff6b35, #ffb703);
  color: white;
}

  </style>
</head>

<body>
    <nav class="bottom-nav">
  <button data-nav="home" onclick="showHome()">🏠<span>Home</span></button>
<button data-nav="recipes" onclick="loadRecipes()">🍲<span>Rezepte</span></button>
<button data-nav="plan" onclick="loadWeeklyPlan()">📅<span>Plan</span></button>
<button data-nav="list" onclick="loadShoppingList()">🛒<span>Liste</span></button>
</nav>
  <header>
    <div class="brand">🍽️ Rezeptroulette</div>
    <button class="secondary" onclick="showHome()">Startseite</button>
  </header>

  <main>
    <section class="hero" id="home">
      <h1>Was essen wir heute?</h1>
      <p class="muted">
        Ziehe ein zufälliges Rezept, stöbere durch alle Gerichte und sieh dir Zutaten und Anleitung direkt in der App an.
      </p>

      <div class="buttons">
        <button class="primary" onclick="loadRoulette()">🎲 Rezept ziehen</button>
        <button class="secondary" onclick="loadRecipes()">🍲 Alle Rezepte</button>
        <button class="secondary" onclick="loadWeeklyPlan()">📅 Wochenplan</button>
        <button class="secondary" onclick="loadShoppingList()">🛒 Einkaufsliste</button>
      </div>
    </section>

    <section id="content"></section>
  </main>

  <script>
    let allRecipes = [];

    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

    function imageUrl(recipe) {
      const raw = recipe.image || recipe.bild || recipe.image_url;
      if (!raw) return "";
      return raw.startsWith("http") ? raw : `/static/images/${raw}`;
    }

    function showHome() {
        setActiveNav("home");
      document.getElementById("content").innerHTML = "";
      document.getElementById("home").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function hideHome() {
      document.getElementById("home").classList.add("hidden");
    }

    async function loadRecipes() {
        setActiveNav("recipes");
      hideHome();

      const content = document.getElementById("content");
      content.innerHTML = "<p>Rezepte werden geladen...</p>";

      const response = await fetch("/rezepte");
      allRecipes = await response.json();

      content.innerHTML = `
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>Alle Rezepte</h2>

        <div class="filters">
          <input id="searchInput" placeholder="Rezept suchen..." oninput="renderRecipes()" />
        <label class="favorite-filter">
  <input type="checkbox" id="favoriteOnly" onchange="renderRecipes()" />
  Nur Favoriten
</label>
          <select id="kitchenFilter" onchange="renderRecipes()">
            <option value="">Alle Küchen</option>
          </select>
        </div>

        <div class="grid" id="recipeGrid"></div>
      `;

      fillKitchenFilter();
      renderRecipes();
    }

    function fillKitchenFilter() {
      const select = document.getElementById("kitchenFilter");
      const kitchens = [...new Set(allRecipes.map(r => r.kueche).filter(Boolean))].sort();

      select.innerHTML = `<option value="">Alle Küchen</option>` +
        kitchens.map(k => `<option value="${k}">${k}</option>`).join("");
    }

    function renderRecipes() {
      const search = document.getElementById("searchInput")?.value.toLowerCase() || "";
      const kitchen = document.getElementById("kitchenFilter")?.value || "";
      const favoriteOnly = document.getElementById("favoriteOnly")?.checked;
      const grid = document.getElementById("recipeGrid");

      if (!grid) return;

      const filtered = allRecipes.filter(recipe => {
        const matchesSearch = recipe.name.toLowerCase().includes(search);
        const matchesKitchen = !kitchen || recipe.kueche === kitchen;
        const matchesFavorite = !favoriteOnly || favorites.includes(recipe.id);

return matchesSearch && matchesKitchen && matchesFavorite;
      });

      grid.innerHTML = filtered.length
        ? filtered.map(recipe => recipeCard(recipe)).join("")
        : `<p>Keine Rezepte gefunden.</p>`;
    }

    function recipeCard(recipe) {
      const img = imageUrl(recipe);

      return `
        <div class="card">
          ${
            img
              ? `<img src="${img}" alt="${recipe.name}">`
              : `<div class="placeholder">Kein Bild</div>`
          }

          <div class="card-body">
          <div class="favorite-row">
  <button class="favorite-btn" onclick="toggleFavorite(${recipe.id})">
    ${isFavorite(recipe.id) ? "❤️" : "🤍"}
  </button>
</div>  
            <h3>${recipe.name}</h3>
            <div class="meta">
              ${recipe.kueche || "Unbekannt"} · ${recipe.kochzeit || "?"} Min · ${recipe.schwierigkeit || "Einfach"}
            </div>
            <button class="primary" onclick="showRecipe(${recipe.id})">Rezept ansehen</button>
          </div>
        </div>
      `;
    }

    async function showRecipe(id) {
      hideHome();

      if (!allRecipes.length) {
        const response = await fetch("/rezepte");
        allRecipes = await response.json();
      }

      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;

      const img = imageUrl(recipe);

      document.getElementById("content").innerHTML = `
        <button class="secondary" onclick="loadRecipes()">← Zurück zu allen Rezepten</button>

        <div class="detail">
          ${
            img
              ? `<img src="${img}" alt="${recipe.name}">`
              : `<div class="placeholder">Kein Bild</div>`
          }

          <div class="detail-body">
            <h1>${recipe.name}</h1>
            <div class="meta">
              ${recipe.kueche || "Unbekannt"} · ${recipe.portionen || "?"} Portionen · ${recipe.kochzeit || "?"} Min · ${recipe.schwierigkeit || "Einfach"}
            </div>

            <div class="columns">
              <div>
                <h2>Zutaten</h2>
                <div class="ingredients">
                  ${(recipe.zutaten || []).map(item => `<div class="ingredient">✓ ${item}</div>`).join("")}
                </div>
              </div>

              <div>
                <h2>Anleitung</h2>
                <div class="steps">
                  ${(recipe.anleitung || "Keine Anleitung vorhanden.")
                    .split("\n")
                    .filter(step => step.trim())
                    .map(step => `<div class="step">${step}</div>`)
                    .join("")}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function loadRoulette() {
      hideHome();

      const content = document.getElementById("content");
      content.innerHTML = "<p>Rezept wird gezogen...</p>";

      const response = await fetch("/roulette");
      const recipe = await response.json();

      allRecipes = [recipe];

      content.innerHTML = `
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>Dein Zufallsrezept</h2>
        <div class="grid">
          ${recipeCard(recipe)}
        </div>
      `;
    }

   async function loadWeeklyPlan() {
    setActiveNav("plan");
  hideHome();

  const content = document.getElementById("content");

  if (!allRecipes.length) {
    const recipeResponse = await fetch("/rezepte");
    allRecipes = await recipeResponse.json();
  }

  const response = await fetch("/wochenplan");
  const plan = await response.json();

  const days = [
    "Montag",
    "Dienstag",
    "Mittwoch",
    "Donnerstag",
    "Freitag",
    "Samstag",
    "Sonntag"
  ];

  content.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>

    <h2>📅 Wochenplan</h2>

    <div class="grid">
      ${days.map(day => {
        const recipeId = plan[day];
        const recipe = allRecipes.find(r => r.id === recipeId);

        return `
          <div class="card">
            <div class="card-body">
              <h3>${day}</h3>

              ${
                recipe
                  ? `
                    <p><strong>${recipe.name}</strong></p>
                    <button class="primary" onclick="showRecipe(${recipe.id})">
                      Rezept ansehen
                    </button>
                  `
                  : `
                    <p>Noch kein Rezept gewählt</p>
                  `
              }

              <select onchange="setDayRecipe('${day}', this.value)">
                <option value="">Rezept auswählen</option>

                ${allRecipes.map(r => `
                  <option value="${r.id}">
                    ${r.name}
                  </option>
                `).join("")}
              </select>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

async function setDayRecipe(day, recipeId) {
  if (!recipeId) return;

  await fetch(`/wochenplan/${day}/${recipeId}`, {
    method: "POST"
  });

  loadWeeklyPlan();
}

   async function loadShoppingList() {
    setActiveNav("list");
  hideHome();

  const content = document.getElementById("content");

  if (!allRecipes.length) {
    const recipeResponse = await fetch("/rezepte");
    allRecipes = await recipeResponse.json();
  }

  const response = await fetch("/wochenplan");
  const plan = await response.json();

  const ingredients = [];

  Object.values(plan).forEach(recipeId => {
    if (!recipeId) return;

    const recipe = allRecipes.find(r => r.id === recipeId);

    if (recipe?.zutaten) {
      ingredients.push(...recipe.zutaten);
    }
  });

  const uniqueIngredients = [...new Set(ingredients)];

  content.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>

    <h2>🛒 Einkaufsliste</h2>
<button class="secondary" onclick="copyShoppingList()">Liste kopieren</button>

    ${
      uniqueIngredients.length
        ? `
          <div class="ingredients">
            ${uniqueIngredients.map(item => `
              <label class="ingredient">
  <input type="checkbox" />
  <span class="shopping-item-text">${item}</span>
</label>
            `).join("")}
          </div>
        `
        : `
          <p class="muted">
            Füge zuerst Rezepte zum Wochenplan hinzu.
          </p>
        `
    }
  `;
}

function copyShoppingList() {
  const items = [...document.querySelectorAll(".shopping-item-text")]
    .map(item => item.textContent.trim())
    .join("\n");

  navigator.clipboard.writeText(items);
  alert("Einkaufsliste kopiert!");
}

function setActiveNav(name) {
  document.querySelectorAll(".bottom-nav button").forEach(btn => {
    btn.classList.remove("active");
  });

  const activeButton = document.querySelector(`[data-nav="${name}"]`);
  if (activeButton) activeButton.classList.add("active");
}

function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderRecipes();
}

function isFavorite(id) {
  return favorites.includes(id);
}
  </script>
</body>
</html>
