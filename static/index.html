<!DOCTYPE html>
<html lang="de">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FX838VSETP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezeptroulette</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#ff6b35">

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(135deg,#fff7ed,#ffe2cf);
      color:#2d1b12;
      min-height:100vh;
    }
    header,main{max-width:1100px;margin:auto}
    header{
      padding:24px 22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }
    main{padding:20px 22px 170px}
    .brand{display:flex;align-items:center;gap:14px;font-size:28px;font-weight:900}
    .logo{width:58px;height:58px;object-fit:contain;border-radius:50%}
    .header-actions{display:flex;gap:10px}
    .hero,.panel,.detail,.card,.roulette-stage{
      background:rgba(255,255,255,.82);
      border-radius:32px;
      box-shadow:0 20px 60px rgba(90,40,15,.14);
    }
    .hero{padding:36px;margin-bottom:24px}
    .hero-badge,.badge,.winner-badge{
      display:inline-flex;
      background:#fff0e6;
      color:#d95d20;
      padding:10px 14px;
      border-radius:999px;
      font-weight:850;
    }
    h1{font-size:clamp(38px,6vw,66px);margin:12px 0;line-height:1}
    h2{margin-top:28px}
    .muted,.meta,.week-empty{color:#7c4a2d}
    .buttons,.card-actions,.filters,.hero-stats{display:flex;flex-wrap:wrap;gap:12px}
    .buttons{margin-top:22px}
    button,input,select,textarea{font:inherit}
    button{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 22px;
      font-weight:850;
      transition:.18s ease;
    }
    button:hover{transform:translateY(-2px)}
    .primary{color:white;background:linear-gradient(135deg,#ff6b35,#ffb703);box-shadow:0 12px 30px rgba(255,107,53,.3)}
    .secondary{background:white;color:#2d1b12;box-shadow:0 8px 22px rgba(90,40,15,.08)}
    .hero-stat{background:white;padding:16px 18px;border-radius:18px;min-width:120px;box-shadow:0 8px 22px rgba(90,40,15,.08)}
    .hero-stat strong{display:block;font-size:26px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:22px}
    .card{
      max-width:430px;
      overflow:hidden;
      position:relative;
      transition:.18s ease;
    }
    .card:hover{transform:translateY(-6px);box-shadow:0 24px 50px rgba(90,40,15,.18)}
    .card img{width:100%;height:230px;object-fit:cover;display:block}
    .card-body{padding:18px}
    .card h3{margin:0 0 8px;font-size:22px}
    .meta{font-size:14px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap}
    .placeholder{height:180px;background:linear-gradient(135deg,#ff6b35,#ffb703);display:grid;place-items:center;color:white;font-weight:900}
    .favorite-row{position:absolute;top:16px;right:16px;z-index:10}
    .favorite-btn{width:42px;height:42px;padding:0;border-radius:50%;background:#fff7ed;display:grid;place-items:center}
    .favorite-btn:active{transform:scale(1.35)}
    .filters{margin:18px 0}
    input,select,textarea{
      padding:14px 16px;
      border:none;
      border-radius:16px;
      background:white;
      box-shadow:0 8px 22px rgba(90,40,15,.08);
    }
    textarea{width:100%;min-height:150px;resize:vertical}
    select{width:100%;margin-top:14px;background:#fff7ed}
    .favorite-filter{display:flex;align-items:center;gap:8px;background:white;padding:12px 16px;border-radius:14px;box-shadow:0 8px 22px rgba(90,40,15,.08)}
    .detail{overflow:hidden;margin-top:22px;background:white}
    .detail img{width:100%;height:420px;object-fit:cover}
    .detail-body{padding:26px;display:flex;flex-direction:column;gap:18px}
    .columns{display:grid;grid-template-columns:.8fr 1.2fr;gap:28px}
    .ingredients,.steps,.shopping-list,.chips{display:grid;gap:12px}
    .ingredient,.step,.shopping-item,.chip{
      background:#fff7ed;
      padding:14px 16px;
      border-radius:16px;
      box-shadow:0 6px 18px rgba(90,40,15,.06);
      font-weight:650;
    }
    .shopping-item{display:flex;gap:12px;align-items:center}
    .shopping-item:has(input:checked){opacity:.55;text-decoration:line-through}
    .week-image{width:100%;height:170px;object-fit:cover;border-radius:18px;margin-bottom:14px}
    .week-title{font-size:18px;font-weight:850}
    .rating{display:flex;gap:6px}
    .rating button{background:#fff7ed;padding:8px 10px;border-radius:12px;font-size:22px;box-shadow:none}
    .toast{position:fixed;top:20px;right:20px;background:#2d1b12;color:white;padding:14px 18px;border-radius:16px;opacity:0;transform:translateY(-10px);transition:.25s;z-index:3000}
    .toast.show{opacity:1;transform:translateY(0)}
    .bottom-nav{
      position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
      width:calc(100% - 24px);max-width:760px;
      background:rgba(255,255,255,.92);backdrop-filter:blur(16px);
      border-radius:26px;display:flex;justify-content:space-around;
      padding:10px;box-shadow:0 12px 40px rgba(90,40,15,.15);z-index:1000;overflow-x:auto;
    }
    .bottom-nav button{background:transparent;display:flex;flex-direction:column;gap:4px;align-items:center;color:#7c4a2d;font-size:13px;padding:8px 10px;min-width:72px;box-shadow:none}
    .bottom-nav button.active{background:linear-gradient(135deg,#ff6b35,#ffb703);color:white}
    .roulette-stage{padding:30px;overflow:hidden;position:relative;margin-top:18px}
    .roulette-track{display:flex;gap:18px;will-change:transform}
    .roulette-item{min-width:240px;background:#fff7ed;border-radius:22px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 24px rgba(90,40,15,.08)}
    .roulette-item img{width:100%;height:160px;object-fit:cover}
    .roulette-item h3{padding:14px;margin:0;font-size:18px}
    .winner-result{margin-top:20px;display:flex;justify-content:center}
    .winner-result .card{max-width:380px;border:5px solid #ffb703;box-shadow:0 0 36px rgba(255,183,3,.65),0 24px 60px rgba(90,40,15,.22)}
    .winner-pop{animation:winnerPop .45s ease}
    @keyframes winnerPop{0%{transform:scale(.9);opacity:0}70%{transform:scale(1.05);opacity:1}100%{transform:scale(1)}}
    .drawer{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;z-index:2500}
    .drawer.show{display:flex}
    .drawer-content{background:white;width:100%;max-height:90vh;overflow:auto;border-radius:28px 28px 0 0;padding:24px}
    .cook-step{font-size:24px;line-height:1.5;background:#fff7ed;padding:24px;border-radius:24px}
    .hidden{display:none}
    body.dark{background:linear-gradient(135deg,#120b08,#2d1b12);color:#fff7ed}
    body.dark .hero,body.dark .card,body.dark .detail,body.dark .hero-stat,body.dark .shopping-item,body.dark .bottom-nav,body.dark .secondary,body.dark input,body.dark select,body.dark textarea,body.dark .roulette-stage,body.dark .drawer-content{background:#24140d;color:#fff7ed}
    body.dark .muted,body.dark .meta,body.dark .week-empty,body.dark .hero-stat span{color:#d8b49c}
    body.dark .ingredient,body.dark .step,body.dark .chip,body.dark .favorite-btn,body.dark .rating button,body.dark .roulette-item,.dark .cook-step{background:#3a2115;color:#fff7ed}
    @media(max-width:760px){
      header{flex-direction:column;align-items:flex-start}
      .header-actions{width:100%;justify-content:space-between}
      .brand{font-size:24px}
      main{padding:16px 14px 150px}
      .hero{padding:24px}
      .columns{grid-template-columns:1fr}
      .detail img{height:280px}
      .roulette-item{min-width:170px}
      .roulette-item img{height:120px}
    }

    .loading-box {
  background: white;
  border-radius: 24px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(90,40,15,0.1);
  margin-top: 20px;
}

.error-box {
  background: #fff0f0;
  color: #b42318;
  border: 2px solid #fda29b;
  border-radius: 24px;
  padding: 24px;
  margin-top: 20px;
  font-weight: 700;
}

  </style>
</head>

<body>
  <div id="toast" class="toast"></div>

  <nav class="bottom-nav">
    <button data-nav="home" onclick="showHome()">🏠<span>Home</span></button>
    <button data-nav="recipes" onclick="loadRecipes()">🍲<span>Rezepte</span></button>
    <button data-nav="favorites" onclick="loadFavorites()">❤️<span>Favoriten</span></button>
    <button data-nav="recent" onclick="loadRecentRecipes()">🕘<span>Zuletzt</span></button>
    <button data-nav="plan" onclick="loadWeeklyPlan()">📅<span>Plan</span></button>
    <button data-nav="list" onclick="loadShoppingList()">🛒<span>Liste</span></button>
    <button data-nav="rescue" onclick="loadFoodRescue()">♻️<span>Rescue</span></button>
  </nav>

  <header>
    <div class="brand">
      <img src="/static/images/Rezeptroulette.png" class="logo" alt="Logo">
      <span>Rezeptroulette</span>
    </div>
    <div class="header-actions">
      <button class="secondary" onclick="showHome()">Startseite</button>
      <button class="secondary" onclick="toggleDarkMode()">🌙</button>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-badge">🍽️ Smarte Rezeptplanung</div>
      <h1>Was essen wir heute?</h1>
      <p class="muted">Ziehe ein zufälliges Rezept, plane deine Woche, rette Lebensmittel und sammle Favoriten.</p>

      <div class="hero-stats">
        <div class="hero-stat"><strong id="recipeCount">0</strong><span>Rezepte</span></div>
        <div class="hero-stat"><strong id="favoriteCount">0</strong><span>Favoriten</span></div>
        <div class="hero-stat"><strong>7</strong><span>Tage Planung</span></div>
      </div>

      <div class="buttons">
        <button class="primary" onclick="loadRoulette()">🎲 Rezept ziehen</button>
        <button class="secondary" onclick="smartRoulette()">✨ Smart Roulette</button>
        <button class="secondary" onclick="loadRecipes()">🍲 Alle Rezepte</button>
        <button class="secondary" onclick="loadWeeklyPlan()">📅 Wochenplan</button>
        <button class="secondary" onclick="loadShoppingList()">🛒 Einkaufsliste</button>
        <button class="secondary" onclick="loadFoodRescue()">♻️ Food Rescue</button>
      </div>
    </section>

    <section id="content"></section>
  </main>

  <div class="drawer" id="cookDrawer">
    <div class="drawer-content">
      <button class="secondary" onclick="closeCookMode()">Schließen</button>
      <h2 id="cookTitle">Kochmodus</h2>
      <div class="cook-step" id="cookStep"></div>
      <div class="buttons">
        <button class="secondary" onclick="previousCookStep()">← Zurück</button>
        <button class="primary" onclick="nextCookStep()">Weiter →</button>
      </div>
    </div>
  </div>

  <script>
    let allRecipes = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
    let ratings = JSON.parse(localStorage.getItem("ratings") || "{}");
    let recentRecipes = JSON.parse(localStorage.getItem("recentRecipes") || "[]");
    let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");
    let cookSteps = [];
    let cookIndex = 0;

    function imageUrl(recipe){
      const raw = recipe.image || recipe.bild || recipe.image_url;
      if(!raw) return "";
      return raw.startsWith("http") ? raw : `/static/images/${raw}`;
    }

    function showToast(msg){
      const t=document.getElementById("toast");
      t.textContent=msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"),2200);
    }

    function setActiveNav(name){
      document.querySelectorAll(".bottom-nav button").forEach(b=>b.classList.remove("active"));
      const active=document.querySelector(`[data-nav="${name}"]`);
      if(active) active.classList.add("active");
    }

    function showHome(){
      setActiveNav("home");
      document.getElementById("content").innerHTML="";
      document.getElementById("home").classList.remove("hidden");
      updateStats();
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function hideHome(){document.getElementById("home").classList.add("hidden")}

    async function ensureRecipesLoaded() {
  try {

    if (!allRecipes.length) {
      const response = await fetch("/rezepte");

      if (!response.ok) {
        throw new Error("Serverfehler");
      }

      allRecipes = await response.json();
    }

    return allRecipes;

  } catch (error) {

    document.getElementById("content").innerHTML = `
      <div class="error-box">
        ❌ Rezepte konnten nicht geladen werden.
        <br><br>
        Bitte später erneut versuchen.
      </div>
    `;

    throw error;
  }
}

    function updateStats(){
      const rc=document.getElementById("recipeCount");
      const fc=document.getElementById("favoriteCount");
      if(rc) rc.textContent=allRecipes.length || 0;
      if(fc) fc.textContent=favorites.length || 0;
    }

    function recipeCard(recipe){
      const img=imageUrl(recipe);
      return `
        <div class="card">
          ${img ? `<img src="${img}" alt="${recipe.name}">` : `<div class="placeholder">Kein Bild</div>`}
          <div class="favorite-row">
            <button class="favorite-btn" onclick="toggleFavorite(${recipe.id})">${isFavorite(recipe.id) ? "❤️" : "🤍"}</button>
          </div>
          <div class="card-body">
            <h3>${recipe.name}</h3>
            <div class="meta">${recipe.kueche || "Unbekannt"} · ${recipe.kochzeit || "?"} Min · ${recipe.schwierigkeit || "Einfach"}</div>
            <div class="card-actions">
              <button class="primary" onclick="showRecipe(${recipe.id})">Rezept ansehen</button>
              <button class="secondary" onclick="quickAddToPlan(${recipe.id})">📅 Planen</button>
              <button class="secondary" onclick="shareRecipe(${recipe.id})">📤 Teilen</button>
            </div>
          </div>
        </div>
      `;
    }

    async function loadRecipes(){
      setActiveNav("recipes");
      hideHome();
      const c=document.getElementById("content");
      c.innerHTML="<p>Rezepte werden geladen...</p>";
      await ensureRecipesLoaded();

      c.innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>🍲 Alle Rezepte</h2>
        <div class="filters">
          <input id="searchInput" placeholder="Rezept oder Zutat suchen..." oninput="renderRecipes()">
          <label class="favorite-filter"><input type="checkbox" id="favoriteOnly" onchange="renderRecipes()"> Nur Favoriten</label>
          <select id="kitchenFilter" onchange="renderRecipes()"><option value="">Alle Küchen</option></select>
        </div>
        <div class="grid" id="recipeGrid"></div>
      `;
      fillKitchenFilter();
      renderRecipes();
    }

    function fillKitchenFilter(){
      const s=document.getElementById("kitchenFilter");
      const kitchens=[...new Set(allRecipes.map(r=>r.kueche).filter(Boolean))].sort();
      s.innerHTML=`<option value="">Alle Küchen</option>`+kitchens.map(k=>`<option value="${k}">${k}</option>`).join("");
    }

    function renderRecipes(){
      const search=document.getElementById("searchInput")?.value.toLowerCase() || "";
      const kitchen=document.getElementById("kitchenFilter")?.value || "";
      const favoriteOnly=document.getElementById("favoriteOnly")?.checked;
      const grid=document.getElementById("recipeGrid");
      if(!grid) return;

      const filtered=allRecipes.filter(r=>{
        const ingredientText=(r.zutaten || []).join(" ").toLowerCase();
        return (!search || r.name.toLowerCase().includes(search) || ingredientText.includes(search)) &&
               (!kitchen || r.kueche===kitchen) &&
               (!favoriteOnly || favorites.includes(r.id));
      });

      grid.innerHTML=filtered.length ? filtered.map(recipeCard).join("") : `<p>Keine Rezepte gefunden.</p>`;
    }

    async function showRecipe(id){
      hideHome();
      await ensureRecipesLoaded();
      const recipe=allRecipes.find(r=>Number(r.id)===Number(id));
      if(!recipe) return;
      saveRecentRecipe(recipe);
      const img=imageUrl(recipe);

      document.getElementById("content").innerHTML=`
        <button class="secondary" onclick="loadRecipes()">← Zurück zu allen Rezepten</button>
        <div class="detail">
          ${img ? `<img src="${img}" alt="${recipe.name}">` : `<div class="placeholder">Kein Bild</div>`}
          <div class="detail-body">
            <h1>${recipe.name}</h1>
            ${ratingStars(recipe.id)}
            <div class="meta">
              <span>🌍 ${recipe.kueche || "Unbekannt"}</span>
              <span>🍽️ ${recipe.portionen || "?"} Portionen</span>
              <span>⏱️ ${recipe.kochzeit || "?"} Min</span>
              <span>🔥 ${recipe.schwierigkeit || "Einfach"}</span>
            </div>
            <div class="buttons">
              <button class="primary" onclick="startCookMode(${recipe.id})">👨‍🍳 Kochmodus</button>
              <button class="secondary" onclick="quickAddToPlan(${recipe.id})">📅 Einplanen</button>
              <button class="secondary" onclick="shareRecipe(${recipe.id})">📤 Teilen</button>
            </div>
            <div class="columns">
              <div>
                <h2>Zutaten</h2>
                <div class="ingredients">${(recipe.zutaten || []).map(i=>`<div class="ingredient">✓ ${i}</div>`).join("")}</div>
              </div>
              <div>
                <h2>Anleitung</h2>
                <div class="steps">${(recipe.anleitung || "Keine Anleitung vorhanden.").split("\n").filter(Boolean).map(s=>`<div class="step">${s}</div>`).join("")}</div>
              </div>
            </div>
          </div>
        </div>
      `;
      window.scrollTo({top:0,behavior:"smooth"});
    }

    async function loadRoulette(){
      setActiveNav("home");
      hideHome();
      const c=document.getElementById("content");
      await ensureRecipesLoaded();
      const winner=allRecipes[Math.floor(Math.random()*allRecipes.length)];
      const rouletteRecipes=[];
      for(let i=0;i<22;i++) rouletteRecipes.push(allRecipes[Math.floor(Math.random()*allRecipes.length)]);

      c.innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>🎲 Rezept-Roulette</h2>
        <div class="roulette-stage">
          <div class="roulette-track" id="rouletteTrack">
            ${rouletteRecipes.map(r=>`
              <div class="roulette-item">
                ${imageUrl(r) ? `<img src="${imageUrl(r)}" alt="${r.name}">` : `<div class="placeholder">Kein Bild</div>`}
                <h3>${r.name}</h3>
              </div>
            `).join("")}
          </div>
        </div>
      `;

      const track=document.getElementById("rouletteTrack");
      let pos=0,speed=48;
      const spin=setInterval(()=>{
        pos-=speed;
        track.style.transform=`translateX(${pos}px)`;
        speed*=.985;
      if (speed < 1.2) {
  clearInterval(spin);

  const result = document.createElement("div");
  result.innerHTML = `
    <h2 class="winner-title">🎉 Dein Treffer</h2>

    <div class="winner-result winner-pop">
      ${recipeCard(winner)}
    </div>

    <div class="buttons">
      <button class="primary" onclick="loadRoulette()">🔁 Nochmal drehen</button>
      <button class="secondary" onclick="showRecipe(${winner.id})">🍽️ Rezept ansehen</button>
    </div>
  `;

  c.appendChild(result);
  showToast("Rezept gezogen!");
}
      },16);
    }

    async function smartRoulette(){
      await ensureRecipesLoaded();
      const pool=allRecipes.filter(r=>!recentRecipes.some(x=>Number(x.id)===Number(r.id)));
      const source=pool.length ? pool : allRecipes;
      const winner=source[Math.floor(Math.random()*source.length)];
      showRecipe(winner.id);
      showToast("Smart Roulette hat gewählt!");
    }

    async function loadWeeklyPlan(){
      setActiveNav("plan");
      hideHome();
      const c=document.getElementById("content");
      await ensureRecipesLoaded();
      const r=await fetch("/wochenplan");
      const plan=await r.json();
      const days=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

      c.innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>📅 Wochenplan</h2>
        <div class="buttons">
          <button class="primary" onclick="autoFillWeek()">✨ Woche automatisch planen</button>
          <button class="secondary" onclick="resetWeek()">🗑️ Woche leeren</button>
        </div>
        <div class="grid">
          ${days.map(day=>{
            const v=plan[day]||plan[day.toLowerCase()]||plan[day.toUpperCase()];
            const id=typeof v==="object"&&v!==null ? v.id : Number(v);
            const recipe=allRecipes.find(r=>Number(r.id)===Number(id));
            return `
              <div class="card">
                <div class="card-body">
                  <h3>📅 ${day}</h3>
                  ${recipe ? `
                    ${imageUrl(recipe) ? `<img class="week-image" src="${imageUrl(recipe)}" alt="${recipe.name}">` : ""}
                    <p class="week-title">${recipe.name}</p>
                    <div class="card-actions">
                      <button class="primary" onclick="showRecipe(${recipe.id})">Rezept ansehen</button>
                      <button class="secondary" onclick="clearDay('${day}')">❌ Entfernen</button>
                    </div>
                  ` : `<p class="week-empty">Noch kein Rezept gewählt</p>`}
                  <select onchange="setDayRecipe('${day}',this.value)">
                    <option value="">Rezept auswählen</option>
                    ${allRecipes.map(r=>`<option value="${r.id}">${r.name}</option>`).join("")}
                  </select>
                </div>
              </div>`;
          }).join("")}
        </div>`;
    }

    async function setDayRecipe(day,id){
      if(!id) return;
      const r=await fetch(`/wochenplan/${encodeURIComponent(day)}/${Number(id)}`,{method:"POST"});
      if(!r.ok){showToast("Fehler beim Speichern");return}
      showToast("Zum Wochenplan hinzugefügt!");
      loadWeeklyPlan();
    }

    async function clearDay(day){
      await fetch(`/wochenplan/clear/${encodeURIComponent(day)}`,{method:"POST"});
      showToast("Rezept entfernt");
      loadWeeklyPlan();
    }

    async function autoFillWeek(){
      await ensureRecipesLoaded();
      const days=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
      const shuffled=[...allRecipes].sort(()=>Math.random()-.5).slice(0,7);
      for(let i=0;i<days.length;i++){
        await fetch(`/wochenplan/${encodeURIComponent(days[i])}/${shuffled[i].id}`,{method:"POST"});
      }
      showToast("Woche automatisch geplant!");
      loadWeeklyPlan();
    }

    async function resetWeek(){
      await fetch("/wochenplan/reset",{method:"POST"});
      showToast("Wochenplan geleert!");
      loadWeeklyPlan();
    }

    async function loadShoppingList(){
      setActiveNav("list");
      hideHome();
      const c=document.getElementById("content");
      await ensureRecipesLoaded();
      const r=await fetch("/wochenplan");
      const plan=await r.json();
      const ingredients=[];
      Object.values(plan).forEach(entry=>{
        if(!entry) return;
        const id=typeof entry==="object" ? Number(entry.id) : Number(entry);
        const recipe=allRecipes.find(r=>Number(r.id)===id);
        if(recipe?.zutaten) ingredients.push(...recipe.zutaten);
      });
      const unique=[...new Set(ingredients)];
      c.innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>🛒 Einkaufsliste</h2>
        <button class="secondary" onclick="copyShoppingList()">Liste kopieren</button>
        ${unique.length ? `<div class="shopping-list">${unique.map(i=>`<label class="shopping-item"><input type="checkbox"><span class="shopping-item-text">${i}</span></label>`).join("")}</div>` : `<p class="muted">Füge zuerst Rezepte zum Wochenplan hinzu.</p>`}`;
    }

    function copyShoppingList(){
      const items=[...document.querySelectorAll(".shopping-item-text")].map(i=>i.textContent.trim()).join("\n");
      if(!items){showToast("Keine Zutaten zum Kopieren.");return}
      navigator.clipboard.writeText(items);
      showToast("Einkaufsliste kopiert!");
    }

    function loadFoodRescue(){
      setActiveNav("rescue");
      hideHome();
      const c=document.getElementById("content");
      c.innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>♻️ Food Rescue</h2>
        <p class="muted">Gib ein, was du zuhause hast. Die App findet passende Rezepte.</p>
        <textarea id="rescueInput" placeholder="Sahne&#10;Paprika&#10;Reis&#10;Eier&#10;Käse">${pantry.join("\n")}</textarea>
        <div class="buttons">
          <button class="primary" onclick="findRescueRecipes()">Lebensmittel retten</button>
          <button class="secondary" onclick="savePantry()">Vorrat speichern</button>
        </div>
        <div id="rescueResults"></div>`;
    }

    function savePantry(){
      pantry=document.getElementById("rescueInput").value.split(/\n|,|;/).map(x=>x.trim()).filter(Boolean);
      localStorage.setItem("pantry",JSON.stringify(pantry));
      showToast("Vorrat gespeichert!");
    }

    async function findRescueRecipes(){
      const input=document.getElementById("rescueInput").value;
      const available=input.split(/\n|,|;/).map(x=>x.trim().toLowerCase()).filter(Boolean);
      if(!available.length){showToast("Bitte Zutaten eingeben.");return}
      await ensureRecipesLoaded();

      const results=allRecipes.map(recipe=>{
        const ingredients=(recipe.zutaten||[]).map(z=>z.toLowerCase());
        const matches=available.filter(a=>ingredients.some(i=>i.includes(a)));
        return {recipe,matches,score:matches.length};
      }).filter(r=>r.score>0).sort((a,b)=>b.score-a.score).slice(0,8);

      document.getElementById("rescueResults").innerHTML=results.length ? `
        <h2>Passende Rezepte</h2>
        <div class="grid">${results.map(r=>`
          <div class="card">
            ${imageUrl(r.recipe) ? `<img src="${imageUrl(r.recipe)}" alt="${r.recipe.name}">` : `<div class="placeholder">Kein Bild</div>`}
            <div class="card-body">
              <span class="badge">${r.score} Treffer</span>
              <h3>${r.recipe.name}</h3>
              <div class="meta">Passt zu: ${r.matches.join(", ")}</div>
              <div class="card-actions">
                <button class="primary" onclick="showRecipe(${r.recipe.id})">Rezept ansehen</button>
                <button class="secondary" onclick="quickAddToPlan(${r.recipe.id})">📅 Planen</button>
              </div>
            </div>
          </div>`).join("")}</div>` : `<p class="muted">Keine passenden Rezepte gefunden.</p>`;
    }

    async function quickAddToPlan(id){
      const day=prompt("Für welchen Tag?\n\nMontag, Dienstag, Mittwoch, Donnerstag, Freitag, Samstag oder Sonntag");
      if(!day) return;
      const r=await fetch(`/wochenplan/${encodeURIComponent(day)}/${Number(id)}`,{method:"POST"});
      showToast(r.ok ? "Zum Wochenplan hinzugefügt!" : "Konnte nicht einplanen.");
    }

    function toggleFavorite(id){
      if(favorites.includes(id)){
        favorites=favorites.filter(f=>f!==id);
        showToast("Aus Favoriten entfernt");
      }else{
        favorites.push(id);
        showToast("Zu Favoriten hinzugefügt");
      }
      localStorage.setItem("favorites",JSON.stringify(favorites));
      updateStats();
      if(document.getElementById("recipeGrid")) renderRecipes();
    }

    function isFavorite(id){return favorites.includes(id)}

    async function loadFavorites(){
      setActiveNav("favorites");
      hideHome();
      await ensureRecipesLoaded();
      const fav=allRecipes.filter(r=>favorites.includes(r.id));
      document.getElementById("content").innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>❤️ Deine Favoriten</h2>
        ${fav.length ? `<div class="grid" id="recipeGrid">${fav.map(recipeCard).join("")}</div>` : `<p class="muted">Du hast noch keine Favoriten gespeichert.</p>`}`;
    }

    function saveRecentRecipe(recipe){
      recentRecipes=recentRecipes.filter(r=>Number(r.id)!==Number(recipe.id));
      recentRecipes.unshift({id:recipe.id,name:recipe.name,bild:recipe.bild,image:recipe.image,image_url:recipe.image_url,kueche:recipe.kueche,kochzeit:recipe.kochzeit,schwierigkeit:recipe.schwierigkeit});
      recentRecipes=recentRecipes.slice(0,6);
      localStorage.setItem("recentRecipes",JSON.stringify(recentRecipes));
    }

    function loadRecentRecipes(){
      setActiveNav("recent");
      hideHome();
      document.getElementById("content").innerHTML=`
        <button class="secondary" onclick="showHome()">← Zurück</button>
        <h2>🕘 Zuletzt angesehen</h2>
        ${recentRecipes.length ? `<div class="grid">${recentRecipes.map(recipeCard).join("")}</div>` : `<p class="muted">Du hast noch keine Rezepte angesehen.</p>`}`;
    }

    function ratingStars(id){
      const current=ratings[id]||0;
      return `<div class="rating">${[1,2,3,4,5].map(s=>`<button onclick="setRating(${id},${s})">${s<=current?"⭐":"☆"}</button>`).join("")}</div>`;
    }

    function setRating(id,value){
      ratings[id]=value;
      localStorage.setItem("ratings",JSON.stringify(ratings));
      showToast("Bewertung gespeichert!");
      showRecipe(id);
    }

    async function shareRecipe(id){
      await ensureRecipesLoaded();
      const recipe=allRecipes.find(r=>Number(r.id)===Number(id));
      if(!recipe) return;
      const text=`${recipe.name} auf Rezeptroulette`;
      if(navigator.share){
        navigator.share({title:recipe.name,text,url:location.href});
      }else{
        navigator.clipboard.writeText(text);
        showToast("Rezept kopiert!");
      }
    }

    async function startCookMode(id){
      await ensureRecipesLoaded();
      const recipe=allRecipes.find(r=>Number(r.id)===Number(id));
      if(!recipe) return;
      cookSteps=(recipe.anleitung||"Keine Anleitung vorhanden.").split("\n").filter(Boolean);
      cookIndex=0;
      document.getElementById("cookTitle").textContent=`👨‍🍳 ${recipe.name}`;
      updateCookStep();
      document.getElementById("cookDrawer").classList.add("show");
    }

    function updateCookStep(){
      document.getElementById("cookStep").textContent=cookSteps[cookIndex] || "Fertig!";
    }
    function nextCookStep(){if(cookIndex<cookSteps.length-1) cookIndex++; updateCookStep();}
    function previousCookStep(){if(cookIndex>0) cookIndex--; updateCookStep();}
    function closeCookMode(){document.getElementById("cookDrawer").classList.remove("show");}

    function toggleDarkMode(){
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode",document.body.classList.contains("dark"));
    }

    if(localStorage.getItem("darkMode")==="true") document.body.classList.add("dark");

    fetch("/rezepte").then(r=>r.json()).then(data=>{
      allRecipes=data;
      updateStats();
    });
  </script>
</body>
</html>
