<!DOCTYPE html>

  <script>
    let allRecipes = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]").map(Number);
    let ratings = JSON.parse(localStorage.getItem("ratings") || "{}");
    let recentRecipes = JSON.parse(localStorage.getItem("recentRecipes") || "[]");
    let pantry = JSON.parse(localStorage.getItem("pantry") || "[]");
    let cookSteps = [];
    let cookIndex = 0;

    const ingredientAlternatives = {
  "mehl": ["Dinkelmehl", "Hafermehl", "Mandelmehl", "Vollkornmehl"],
  "milch": ["Mandelmilch", "Hafermilch", "Sojamilch", "laktosefreie Milch"],
  "sahne": ["Cremefine", "Hafercuisine", "Kokosmilch"],
  "butter": ["Margarine", "Olivenöl", "Kokosöl"],
  "zucker": ["Erythrit", "Honig", "Ahornsirup", "Agavendicksaft"],
  "ei": ["Apfelmus", "Leinsamen-Ei", "Banane"],
  "eier": ["Apfelmus", "Leinsamen-Ei", "Banane"],
  "quark": ["Skyr", "griechischer Joghurt", "pflanzlicher Quark"],
  "skyr": ["Magerquark", "griechischer Joghurt", "pflanzlicher Skyr"],
  "käse": ["Mozzarella light", "Reibekäse light", "veganer Käse"],
  "nudeln": ["Vollkornnudeln", "Linsennudeln", "High-Protein Nudeln"],
  "reis": ["Quinoa", "Bulgur", "Couscous"],
  "hackfleisch": ["Hähnchenhack", "Rinderhack light", "Sojagranulat"],
  "hähnchen": ["Putenbrust", "Tofu", "Kichererbsen"],
  "kartoffeln": ["Süßkartoffeln", "Pastinaken", "Blumenkohl"],
  "brokkoli": ["Blumenkohl", "Zucchini", "grüne Bohnen"]
};

function normalizeIngredientText(text){
  return String(text || "")
    .toLowerCase()
    .replaceAll("ä","ae")
    .replaceAll("ö","oe")
    .replaceAll("ü","ue")
    .replaceAll("ß","ss");
}

function getIngredientAlternatives(ingredient){
  const text = normalizeIngredientText(ingredient);

  for(const key in ingredientAlternatives){
    const normalizedKey = normalizeIngredientText(key);

    if(text.includes(normalizedKey)){
      return ingredientAlternatives[key];
    }
  }

  return [];
}

function renderIngredientBlock(ingredient){
  const alternatives = getIngredientAlternatives(ingredient);

  return `
    <div class="ingredient ingredient-builder">
      <div class="ingredient-main">✓ ${ingredient}</div>

      ${alternatives.length ? `
        <div class="ingredient-alt-box">
          <span>Alternativen:</span>
          ${alternatives.map(alt => `
            <button class="alt-btn" onclick="event.stopPropagation(); showToast('${ingredient} → ${alt}')">
              ${alt}
            </button>
          `).join("")}
        </div>
      ` : ""}
    </div>
  `;
}

    function imageUrl(recipe){
      const raw = recipe.image || recipe.bild || recipe.image_url;
      if(!raw) return "";
      return raw.startsWith("http") ? raw : `/static/images/${raw}`;
    }

    function showToast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }

    function setActiveNav(name){
      document.querySelectorAll(".top-nav button").forEach(b => b.classList.remove("active"));
      const active = document.querySelector(`[data-nav="${name}"]`);
      if(active) active.classList.add("active");
    }

    function showSkeleton(target){
      target.innerHTML = `
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      `;
    }

    function showHome(){
      setActiveNav("home");
      document.getElementById("home").classList.remove("hidden");
      updateStats();
      renderHomeSections();
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function hideHome(){
      document.getElementById("home").classList.add("hidden");
    }

    function loadRecipeImport(){
  hideHome();
  setActiveNav("import");

  const c = document.getElementById("content");

  c.innerHTML = `
    <button class="secondary" onclick="showHome()">← Zurück</button>

    <div class="panel" style="display:grid;gap:16px;margin-top:20px;">
      <div>
        <span class="hero-badge">🔗 Rezept aus Link</span>
        <h1>Rezept importieren</h1>
        <p class="muted">
          Füge einen Link von TikTok, YouTube oder Instagram ein. Die App legt daraus ein Rezept an.
        </p>
      </div>

      <input id="recipeImportUrl" placeholder="https://www.youtube.com/watch?v=...">

      <button class="primary" onclick="saveRecipeFromLink()">Rezept aus Link erstellen</button>
    </div>
  `;
}

async function saveRecipeFromLink(){
  const url = document.getElementById("recipeImportUrl").value.trim();

  if(!url){
    showToast("Bitte Link einfügen.");
    return;
  }

  const response = await fetch("/rezept-aus-link", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({url})
  });

  if(!response.ok){
    showToast("Rezept konnte nicht importiert werden.");
    return;
  }

  const recipe = await response.json();

  allRecipes = [];
  await ensureRecipesLoaded();

  showToast("Rezept wurde angelegt!");
  showRecipe(recipe.id);
}

function drawRouletteRecipe(){
  const selected = document.getElementById("rouletteCategory")?.value || "Alle";
  const result = document.getElementById("rouletteResult");
  if(!result) return;

  let pool = allRecipes;

  if(selected !== "Alle"){
    pool = allRecipes.filter(recipe => {
      const text = [
        recipe.name || "",
        recipe.kueche || "",
        ...(recipe.tags || [])
      ].join(" ").toLowerCase();

      if(selected === "Frühstück"){
        return text.includes("frühstück");
      }

      if(selected === "Mittagessen"){
        return text.includes("mittag") || text.includes("herzhaft") || text.includes("hauptgericht");
      }

      if(selected === "Abendbrot"){
        return text.includes("abend") || text.includes("brot") || text.includes("snack");
      }

      return true;
    });
  }

  if(!pool.length){
    result.innerHTML = `<div class="empty-state">Keine Rezepte für ${selected} gefunden.</div>`;
    return;
  }

  const winner = pool[Math.floor(Math.random() * pool.length)];
  const img = imageUrl(winner);

  result.innerHTML = `
    <div class="roulette-result-card">
      <div class="roulette-image-wrap">
        ${img ? `<img src="${img}" alt="${winner.name}">` : `<div class="placeholder">Kein Bild</div>`}
      </div>

      <div class="roulette-result-body">
        <span class="badge">🎉 Dein Treffer</span>
        <h2>${winner.name}</h2>

        <div class="meta">
          ${winner.kueche && winner.kueche !== "PDF Import"
  ? `<span>🌍 ${winner.kueche}</span>`
  : ""}
          <span>⏱️ ${winner.kochzeit || "?"} Min</span>
          <span>🔥 ${winner.schwierigkeit || "Einfach"}</span>
        </div>

        <div class="buttons">
          <button class="primary" onclick="showRecipe(${winner.id})">Rezept öffnen</button>
          <button class="secondary" onclick="drawRouletteRecipe()">Nochmal ziehen</button>
        </div>
      </div>
    </div>
  `;
}

      const days = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

      for(let i = 0; i < days.length && shuffled[i]; i++){
        await fetch(`/wochenplan/${encodeURIComponent(days[i])}/${shuffled[i].id}`,{method:"POST"});
      }
      showToast("Woche automatisch geplant!");
      loadWeeklyPlan();

    async function findRescueRecipes(){
      const input = document.getElementById("rescueInput").value;
      const available = input.split(/\n|,|;/).map(x => x.trim().toLowerCase()).filter(Boolean);
      if(!available.length) return showToast("Bitte Zutaten eingeben.");
      await ensureRecipesLoaded();

      const results = allRecipes.map(recipe => {
        const ingredients = (recipe.zutaten || []).map(z => z.toLowerCase());
        const matches = available.filter(a => ingredients.some(i => i.includes(a)));
        return {recipe,matches,score:matches.length};
      }).filter(r => r.score > 0).sort((a,b) => b.score - a.score).slice(0,8);

      document.getElementById("rescueResults").innerHTML = results.length
        ? `<h2>Passende Rezepte</h2><div class="grid">${results.map(r => recipeCard(r.recipe)).join("")}</div>`
        : `<div class="empty-state"><h2>Keine passenden Rezepte gefunden</h2><p>Versuche allgemeinere Zutaten wie Reis, Käse oder Tomaten.</p></div>`;
    }

    async function startCookMode(id){
      await ensureRecipesLoaded();
      const recipe = allRecipes.find(r => Number(r.id) === Number(id));
      if(!recipe) return;
      cookSteps = (recipe.anleitung || "Keine Anleitung vorhanden.").split("\n").filter(Boolean);
      cookIndex = 0;
      document.getElementById("cookTitle").textContent = `👨‍🍳 ${recipe.name}`;
      updateCookStep();
      document.getElementById("cookDrawer").classList.add("show");
    }

    function updateCookStep(){
      document.getElementById("cookStep").textContent = cookSteps[cookIndex] || "Fertig!";
    }

    function nextCookStep(){
      if(cookIndex < cookSteps.length - 1) cookIndex++;
      updateCookStep();
    }

    function previousCookStep(){
      if(cookIndex > 0) cookIndex--;
      updateCookStep();
    }

    function closeCookMode(){
      document.getElementById("cookDrawer").classList.remove("show");
    }

      localStorage.setItem("darkMode",document.body.classList.contains("dark"));
    }

    if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");

    fetch("/rezepte")
      .then(r => r.json())
      .then(data => {
        allRecipes = data;
        renderHomeSections();
      })
      .catch(() => {
        document.getElementById("content").innerHTML = `<div class="error-box">❌ Rezepte konnten nicht geladen werden.</div>`;
      });

    showHome();
  </script>
</body>
</html>
